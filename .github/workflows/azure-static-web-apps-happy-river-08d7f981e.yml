name: Deploy web app to Azure Static Web Apps

on:
  push:
    branches: [master] # Replace with your default branch if different
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master] # Replace with your default branch if different

# Environment variables available to all jobs and steps in this workflow
env:
  APP_LOCATION: "/" # Location of your Angular client code
  API_LOCATION: ""  # Optional: if you have an API, set the path, otherwise leave it empty
  APP_ARTIFACT_LOCATION: "dist/sri-frontend" # Adjust to match your Angular build output directory
  AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_08D7F981E }} # Secret containing the deployment token for your Static Web App

permissions:
  contents: read

jobs:
  build_and_deploy_job:
    permissions:
      contents: read # For actions/checkout to fetch code
      pull-requests: write # For Azure/static-web-apps-deploy to comment on PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # Use a stable LTS version

      - name: Clear npm cache and install dependencies
        run: |
          rm -rf node_modules
          rm package-lock.json
          npm cache clean --force
          npm install --no-optional  # Avoid optional dependencies that cause issues

      - name: Build the project
        run: npm run build --if-present

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }} # Secret containing the API token for the app
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          app_location: ${{ env.APP_LOCATION }} # Path to your app's source code
          api_location: ${{ env.API_LOCATION }}   # Path to your API's source code (leave empty if not applicable)
          app_artifact_location: ${{ env.APP_ARTIFACT_LOCATION }} # Path to your app's build output directory
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    permissions:
      contents: none
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }} # Secret containing the API token for the app
          action: "close"
