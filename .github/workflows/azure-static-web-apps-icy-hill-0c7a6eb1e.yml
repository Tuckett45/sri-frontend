name: Build and Deploy to Azure Static Web App

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'  # Use Node.js 20 for dependency compatibility

      - name: Clear npm cache and install dependencies
        run: |
          rm -rf node_modules
          rm package-lock.json
          npm cache clean --force
          npm install --no-optional  # Avoid optional dependencies that cause issues

      - name: Build the project
        run: npm run build --if-present

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist  # Adjust this if your build output is in a different folder

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}  # Make sure to set this secret in GitHub
          app_location: "/"  # Adjust if your app is in a subdirectory
          api_location: "api"  # Specify if you have an API folder
          output_location: "dist"  # Adjust to your build output directory
