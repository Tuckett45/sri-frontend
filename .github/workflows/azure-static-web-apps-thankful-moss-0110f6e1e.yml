name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  # Build-only job for PRs to validate the code without deploying (due to Azure staging environment limits)
  build_only_job:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build Only Job (PR Validation)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Clear npm cache and install dependencies
        run: |
          rm -rf node_modules
          rm package-lock.json
          npm cache clean --force
          npm install --no-optional

      - name: Build the project
        run: |
          npm install 
          npm run build --if-present

  build_and_deploy_job:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'  # Ensure you use a compatible Node.js version

      - name: Clean npm cache and install dependencies
        run: |
          rm -rf node_modules
          rm package-lock.json
          npm cache clean --force
          npm install --no-optional

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_MOSS_0110F6E1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (i.e. PR comments)
          action: "upload"
          app_location: "/"  # App source code path, adjust if necessary
          output_location: "dist/sri-frontend"  # Adjust to your build output directory
          skip_app_build: true # Skip building in Azure since we build locally with Node.js 20

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_MOSS_0110F6E1E }}
          action: "close"
