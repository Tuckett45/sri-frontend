name: Build and deploy Node.js app to Azure Web App - proxy-server

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'  # Switch to LTS version to avoid issues

      - name: Install dependencies
        run: |
          cd backend
          npm i

      - name: Build (optional if your proxy server needs it)
        run: |
          cd backend
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./backend  # Specify the correct directory if needed

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_585688D59DBE4A909CA9EB571912CA34 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0EF2BCD1DA6F42D3BF9D7901AA57B084 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2304A2088F8D4DEEA167C39475C74DC4 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'proxy-server'
          slot-name: 'Production'
          package: ./backend  # Path to the build output
