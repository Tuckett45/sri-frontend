<div class="p-mb-3 text-right">
  <button pButton type="button" label="Add Expenses" icon="pi pi-plus" (click)="openAddExpense()"></button>
</div>
<div class="table-wrapper">
<p-table [value]="expenses" [paginator]="true" [rows]="10" [loading]="loading">
  <ng-template pTemplate="header">
    <tr>
      <th>Date</th>
      <th>Category</th>
      <th>Amount</th>
      <th>Description</th>
      <th>Receipt</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-expense>
    <tr>
      <td>{{ expense.date | date:'shortDate' }}</td>
      <td>{{ expense.category }}</td>
      <td>{{ expense.amount | currency }}</td>
      <td>{{ expense.description }}</td>
      <td>
        <a *ngIf="expense.receiptUrl" [href]="expense.receiptUrl" target="_blank">View</a>
      </td>
      <td>
        <p-tag [value]="expense.status"></p-tag>
      </td>
      <td class="actions-container">
        <mat-icon class="edit-icon" (click)="openEditExpense(expense)">edit</mat-icon>
        <mat-icon class="delete-icon" (click)="openDeleteConfirmationDialog(expense)">delete</mat-icon>
      </td>
    </tr>
  </ng-template>
</p-table>
</div>
