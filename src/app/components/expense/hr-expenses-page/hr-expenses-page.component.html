<div class="page-controls">
  <div class="left-controls">
    <button
      mat-stroked-button
      type="button"
      class="toggle-filters-btn"
      (click)="toggleFilters()"
      aria-controls="hr-filters">
      <mat-icon>{{ filtersOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
      {{ filtersOpen ? 'Hide Filters' : 'Show Filters' }}
    </button>
  </div>

  <div class="export-buttons">
    <div class="export-range">
      <mat-checkbox style="color: black;" [(ngModel)]="exportUseRange">Export by date range</mat-checkbox>
      <div class="range-inputs" *ngIf="exportUseRange">
        <mat-form-field style="color: black;" appearance="outline">
          <mat-label>Start</mat-label>
          <input matInput [matDatepicker]="exportStart" [(ngModel)]="exportStartDate">
          <mat-datepicker-toggle matSuffix [for]="exportStart"></mat-datepicker-toggle>
          <mat-datepicker #exportStart></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>End</mat-label>
          <input matInput [matDatepicker]="exportEnd" [(ngModel)]="exportEndDate">
          <mat-datepicker-toggle matSuffix [for]="exportEnd"></mat-datepicker-toggle>
          <mat-datepicker #exportEnd></mat-datepicker>
        </mat-form-field>
      </div>
    </div>

    <button mat-raised-button [matMenuTriggerFor]="pdfMenu" class="header-btn">
      <mat-icon>picture_as_pdf</mat-icon>
      Export to PDF
    </button>
    <mat-menu #pdfMenu="matMenu">
      <button mat-menu-item (click)="exportPdf('none')">
        <mat-icon>description</mat-icon>
        Simple Export
      </button>
      <button mat-menu-item (click)="exportPdf('employee')">
        <mat-icon>person</mat-icon>
        Group by Employee
      </button>
      <button mat-menu-item (click)="exportPdf('category')">
        <mat-icon>category</mat-icon>
        Group by Category
      </button>
      <button mat-menu-item (click)="exportPdf('job')">
        <mat-icon>work</mat-icon>
        Group by Job
      </button>
    </mat-menu>

    <button mat-raised-button [matMenuTriggerFor]="csvMenu" class="export-btn">
      <mat-icon>table_view</mat-icon>
      Export to CSV
    </button>
    <mat-menu #csvMenu="matMenu">
      <button mat-menu-item (click)="exportCsv('none')">
        <mat-icon>description</mat-icon>
        Simple Export
      </button>
      <button mat-menu-item (click)="exportCsv('employee')">
        <mat-icon>person</mat-icon>
        Group by Employee
      </button>
      <button mat-menu-item (click)="exportCsv('category')">
        <mat-icon>category</mat-icon>
        Group by Category
      </button>
      <button mat-menu-item (click)="exportCsv('job')">
        <mat-icon>work</mat-icon>
        Group by Job
      </button>
    </mat-menu>
    <button mat-raised-button class="receipt-export-btn" (click)="exportReceipts()">
      <mat-icon>download</mat-icon>
      Download Receipts
    </button>
  </div>
</div>

<app-expense-filters
  *ngIf="filtersOpen"
  id="hr-filters"
  [statusOptions]="statusOptions"
  [categoryOptions]="categoryOptions"
  [employeeOptions]="employeeOptions"
  (filtersChange)="onFiltersChange($event)">
</app-expense-filters>

<div class="bulk-actions">
  <div class="selection-summary">
    <mat-icon>fact_check</mat-icon>
    <span>{{ selectedCount }} selected</span>
  </div>
  <div class="bulk-buttons">
    <button
      mat-raised-button
      class="bulk-btn primary"
      type="button"
      (click)="bulkUpdateStatus(expenseStatus.Approved)"
      [disabled]="!hasSelection || loading || bulkUpdating">
      Approve Selected
    </button>
    <button
      mat-raised-button
      class="bulk-btn secondary"
      type="button"
      (click)="bulkUpdateStatus(expenseStatus.Rejected)"
      [disabled]="!hasSelection || loading || bulkUpdating">
      Reject Selected
    </button>
    <button
      mat-raised-button
      class="bulk-btn secondary"
      type="button"
      (click)="bulkUpdateStatus(expenseStatus.Paid)"
      [disabled]="!hasSelection || loading || bulkUpdating">
      Mark Paid
    </button>
    <button mat-button type="button" (click)="clearSelection()" [disabled]="!hasSelection">
      Clear
    </button>
  </div>
</div>

<app-expense-table
  [expenses]="expenses"
  [loading]="loading || statusUpdatingIds.size > 0 || bulkUpdating"
  [showEmployeeColumn]="true"
  [showAddButton]="false"
  [enableEdit]="true"
  [enableDelete]="false"
  [enableApproval]="true"
  [enableSelection]="true"
  [selectedExpenseIds]="selectedExpenseIds"
  [pendingStatusIds]="statusUpdatingIds"
  [emptyStateMessage]="'No expenses match the current filters.'"
  [serverPagination]="true"
  [pageSize]="pageSize"
  [pageIndex]="pageIndex"
  [pageSizeOptions]="pageSizeOptions"
  [totalItems]="totalItems"
  (pageChange)="onPageChange($event)"
  (edit)="openExpenseDetails($event)"
  (approve)="onApprove($event)"
  (reject)="onReject($event)"
  (selectionChange)="onSelectionChange($event)">
</app-expense-table>
