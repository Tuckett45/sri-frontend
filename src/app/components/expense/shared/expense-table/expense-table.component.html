<div class="expense-table" [class.is-loading]="loading">
  <div class="loading-overlay" *ngIf="loading">
    <mat-progress-spinner diameter="48" mode="indeterminate"></mat-progress-spinner>
  </div>

  <div class="table-actions" *ngIf="showAddButton">
    <button mat-raised-button (click)="onAddClicked()">
      {{ addButtonLabel }}
    </button>
  </div>

  <div class="table-wrapper" *ngIf="dataSource.data.length; else emptyState">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1">

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
        <td mat-cell *matCellDef="let expense">{{ expense.date | date:'shortDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="phase">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Phase</th>
        <td mat-cell *matCellDef="let expense">{{ expense.phase || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="employee" *ngIf="showEmployeeColumn">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Employee</th>
        <td mat-cell *matCellDef="let expense">{{ expense.createdBy || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="job">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Job</th>
        <td mat-cell *matCellDef="let expense">{{ expense.projectId || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
        <td mat-cell *matCellDef="let expense">{{ expense.amount | currency }}</td>
      </ng-container>

      <ng-container matColumnDef="notes">
        <th mat-header-cell *matHeaderCellDef>Notes</th>
        <td mat-cell *matCellDef="let expense">{{ getNotes(expense) || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="receipt">
        <th mat-header-cell *matHeaderCellDef>Receipt</th>
        <td mat-cell *matCellDef="let expense">
          <ng-container *ngIf="getReceiptUrl(expense) as receiptUrl">
            <button
              mat-icon-button
              type="button"
              matTooltip="View receipt"
              (click)="openGallery(expense)"
              [disabled]="loading">
              <mat-icon>photo_library</mat-icon>
            </button>

            <button mat-icon-button type="button" matTooltip="Open in new tab" (click)="openInNewTab(expense)" [disabled]="loading">
              <mat-icon>open_in_new</mat-icon>
            </button>
          </ng-container>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let expense">
          <p-tag [value]="expense.status"></p-tag>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions" *ngIf="hasActionColumn">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell class="actions-container" *matCellDef="let expense">
          <button
            *ngIf="canEdit()"
            mat-icon-button
            matTooltip="Edit"
            type="button"
            (click)="onEdit(expense)"
            [disabled]="loading">
            <mat-icon class="action-icon is-edit">edit</mat-icon>
          </button>
          <button
            *ngIf="canDelete()"
            mat-icon-button
            matTooltip="Delete"
            type="button"
            (click)="onDelete(expense)"
            [disabled]="loading">
            <mat-icon class="action-icon is-delete">delete</mat-icon>
          </button>
          <button
            *ngIf="canApproveOrReject()"
            mat-icon-button
            matTooltip="Approve"
            type="button"
            [disabled]="loading || isStatusPending(expense)"
            (click)="onApprove(expense)">
            <mat-icon class="approve-icon">check</mat-icon>
          </button>
          <button
            *ngIf="canApproveOrReject()"
            mat-icon-button
            matTooltip="Reject"
            type="button"
            [disabled]="loading || isStatusPending(expense)"
            (click)="onReject(expense)">
            <mat-icon class="reject-icon">close</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackByExpenseId"></tr>
    </table>

    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>

  <ng-template #emptyState>
    <div class="empty-state">{{ emptyStateMessage }}</div>
  </ng-template>

  <p-galleria
    *ngIf="isReceiptGalleryVisible"
    [value]="galleryImages"
    [(visible)]="isReceiptGalleryVisible"
    [responsiveOptions]="[
      { breakpoint: '1024px', numVisible: 3 },
      { breakpoint: '768px', numVisible: 2 },
      { breakpoint: '560px', numVisible: 1 }
    ]"
    [containerStyle]="{ 'max-width': '80%' }"
    [circular]="true"
    [fullScreen]="true"
    [transitionInterval]="1500"
    [showItemNavigators]="true"
    [showThumbnails]="true"
    (onHide)="closeGallery()">
    <ng-template pTemplate="item" let-item>
      <div class="galleria-item">
        <img [src]="item.itemImageSrc" />
      </div>
    </ng-template>
    <ng-template pTemplate="thumbnail" let-item>
      <div class="galleria-thumbnail">
        <img [src]="item.itemImageSrc" />
      </div>
    </ng-template>
  </p-galleria>
</div>
