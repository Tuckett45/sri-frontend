<div class="text-right export-buttons mb-4">
  <button mat-raised-button class="header-btn" (click)="exportPdf()">
    <mat-icon>picture_as_pdf</mat-icon> Export to PDF
  </button>
  <button mat-raised-button class="export-btn ml-2" (click)="exportCsv()">
    <mat-icon>table_view</mat-icon> Export to CSV
  </button>
</div>

<div class="filter-selections flex align-items-center gap-1">
  <div class="mat-grid-tile col-3 md:col-3">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Start Date</mat-label>
      <input matInput [matDatepicker]="startPicker" formControlName="startDate">
      <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>
  </div>

  <div class="mat-grid-tile col-3 md:col-3">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>End Date</mat-label>
      <input matInput [matDatepicker]="endPicker" formControlName="endDate">
      <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>
  </div>

  <div class="mat-grid-tile col-3 md:col-3">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Job</mat-label>
      <input matInput formControlName="job">
    </mat-form-field>
  </div>

  <div class="mat-grid-tile col-3 md:col-3">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option *ngFor="let status of statusOptions" [value]="status">{{ status }}</mat-option>
        <mat-option [value]="null">Clear</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</div>

<div class="table-wrapper">
  
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
  
    <!-- Date Column -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let expense">{{ expense.date | date: 'shortDate' }}</td>
    </ng-container>

    <!-- Job Column -->
    <ng-container matColumnDef="job">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Job</th>
      <td mat-cell *matCellDef="let expense">{{ expense.job }}</td>
    </ng-container>

    <!-- Amount Column -->
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
      <td mat-cell *matCellDef="let expense">{{ expense.amount | currency }}</td>
    </ng-container>

    <!-- Notes Column -->
    <ng-container matColumnDef="notes">
      <th mat-header-cell *matHeaderCellDef>Notes</th>
      <td mat-cell *matCellDef="let expense">{{ expense.notes }}</td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let expense">{{ expense.status }}</td>
    </ng-container>
  
    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td class="actions-container" *matCellDef="let expense">
        <mat-icon class="edit-icon" (click)="openEditExpense(expense)">edit</mat-icon>
        <mat-icon class="delete-icon" (click)="openDeleteConfirmationDialog(expense)">delete</mat-icon>
      </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  
  <mat-paginator [length]="filteredExpenses.length"
                 [pageSize]="10"
                 [pageSizeOptions]="[5, 10, 20]">
  </mat-paginator>
  
</div>
