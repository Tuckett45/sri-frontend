<div class="p-mb-3 text-right mt-2">
  <button mat-raised-button class="header-btn" (click)="openAddExpense()">
    Add Expenses
  </button>
</div>

<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1">

    <!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let expense">{{ expense.date | date:'shortDate' }}</td>
    </ng-container>

    <!-- Job -->
    <ng-container matColumnDef="job">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Job</th>
      <td mat-cell *matCellDef="let expense">{{ expense.job }}</td>
    </ng-container>

    <!-- Amount -->
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
      <td mat-cell *matCellDef="let expense">{{ expense.amount | currency }}</td>
    </ng-container>

    <!-- Notes -->
    <ng-container matColumnDef="notes">
      <th mat-header-cell *matHeaderCellDef>Notes</th>
      <td mat-cell *matCellDef="let expense">{{ expense.notes }}</td>
    </ng-container>

    <!-- Receipt -->
    <ng-container matColumnDef="receipt">
      <th mat-header-cell *matHeaderCellDef>Receipt</th>
      <td mat-cell *matCellDef="let expense">
        <ng-container *ngIf="getReceiptUrl(expense) as receiptUrl">
          <!-- View (fullscreen gallery) -->
          <button
            mat-icon-button
            type="button"
            matTooltip="View receipt"
            (click)="openGallery(expense)">
            <mat-icon>photo_library</mat-icon>
          </button>

          <!-- Open in new tab -->
          <a
            mat-icon-button
            [href]="receiptUrl"
            target="_blank"
            rel="noopener"
            matTooltip="Open in new tab">
            <mat-icon>open_in_new</mat-icon>
          </a>
        </ng-container>
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let expense">
        <p-tag [value]="expense.status"></p-tag>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell class="actions-container" *matCellDef="let expense">
        <button mat-icon-button matTooltip="Edit" (click)="openEditExpense(expense)">
          <mat-icon class="edit-icon">edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Delete" (click)="openDeleteConfirmationDialog(expense)">
          <mat-icon class="delete-icon">delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row        *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>
</div>

<!-- Single PrimeNG Galleria instance -->
<p-galleria
  *ngIf="isReceiptGalleryVisible"
  [value]="galleryImages"
  [(visible)]="isReceiptGalleryVisible"
  [responsiveOptions]="[
    { breakpoint: '1024px', numVisible: 3 },
    { breakpoint: '768px', numVisible: 2 },
    { breakpoint: '560px', numVisible: 1 }
  ]"
  [containerStyle]="{ 'max-width': '80%' }"
  [circular]="true"
  [fullScreen]="true"
  [transitionInterval]="1500"
  [showItemNavigators]="true"
  [showThumbnails]="true">
  <ng-template pTemplate="item" let-item>
    <div style="display:flex;justify-content:center;align-items:center;">
      <img [src]="item.itemImageSrc"
           style="max-width:80%;max-height:1000px;object-fit:contain;display:block;border-radius:10px;box-shadow:0 4px 8px rgba(0,0,0,.2);" />
    </div>
  </ng-template>
  <ng-template pTemplate="thumbnail" let-item>
    <div style="display:flex;justify-content:center;align-items:center;">
      <img [src]="item.itemImageSrc"
           style="width:80px;height:80px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid #ddd;" />
    </div>
  </ng-template>
</p-galleria>
