<mat-toolbar color="primary">
  <!-- Logo -->
  <img width="100" alt="SRI Logo" src="assets/images/SRI_IntegrationServices-logo-white-small-2.png" />

  <!-- Spacer to push the navigation links to the right -->
  <span class="spacer"></span>

  <!-- Hamburger Menu Icon -->
  <div aria-label="Toggle menu">
    <mat-icon mat-button class="menu-toggle" (click)="toggleMenu()">{{ isMenuOpen ? 'close' : 'menu' }}</mat-icon>  <!-- Toggle between 'menu' and 'close' icon -->
  </div>

  <!-- Navigation Links -->
  <div class="nav-links" [ngClass]="{ 'open': isMenuOpen, 'closed': !isMenuOpen }">
    <ng-container *ngFor="let link of navLinks">
      <button
        *ngIf="link.isVisible()"
        mat-button
        [routerLink]="link.route"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="link.exact ? exactMatchOptions : defaultMatchOptions"
        [ngClass]="link.cssClass"
      >
        <ng-container *ngIf="!link.isNotifications; else notificationLink">
          {{ link.label }}
        </ng-container>
        <ng-template #notificationLink>
          <span class="flex align-items-center gap-2">
            {{ link.label }}
            <p-badge
              *ngIf="unreadCount() > 0"
              [value]="unreadCount()"
              severity="danger"
            ></p-badge>
          </span>
        </ng-template>
      </button>
    </ng-container>
    <button mat-button (click)="logout()">Logout</button>
  </div>
</mat-toolbar>
