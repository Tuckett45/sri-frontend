<mat-toolbar color="primary">
  <!-- Logo -->
  <img width="100" alt="SRI Logo" src="assets/images/SRI_IntegrationServices-logo-white-small-2.png" />

  <!-- Spacer to push the navigation links to the right -->
  <span class="spacer"></span>

  <!-- Hamburger Menu Icon -->
  <div aria-label="Toggle menu">
    <mat-icon mat-button class="menu-toggle" (click)="toggleMenu()">{{ isMenuOpen ? 'close' : 'menu' }}</mat-icon>  <!-- Toggle between 'menu' and 'close' icon -->
  </div>

  <!-- Navigation Links -->
  <div class="nav-links" [ngClass]="{ 'open': isMenuOpen, 'closed': !isMenuOpen }">
    <button *ngIf="!authService.isTemp() || !authService.isCoordinator()" mat-button routerLink="/overview" routerLinkActive="active-link">
      Overview
    </button>
    <button *ngIf="!authService.isTemp() || !authService.isCoordinator()"  mat-button routerLink="/preliminary-punch-list" routerLinkActive="active-link">
      Prelim Punch List Tracker
    </button>
    <button *ngIf="authService.isCM() || authService.isAdmin() || authService.isTemp()"  mat-button routerLink="/street-sheet" routerLinkActive="active-link">
      Street Sheet Tracker
    </button>
    <button *ngIf="authService.isCoordinator() || authService.isAdmin()"  mat-button routerLink="/osp-coordinator-tracker" routerLinkActive="active-link">
      OSP Coordinator
    </button>
    <button *ngIf="authService.isMarketController() || authService.isAdmin()"  mat-button routerLink="/market-controller-tracker" routerLinkActive="active-link">
      Market Controller
    </button>
    <button mat-button *ngIf="authService.isAdmin()"  routerLink="/expenses" routerLinkActive="active-link">

      Expenses
    </button>
    <button mat-button *ngIf="authService.isAdmin()"  routerLink="/tps" routerLinkActive="active-link">
      TPS
    </button>
    <button mat-button routerLink="/profile" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
      Profile
    </button>
    <button mat-button (click)="logout()">Logout</button>
  </div>
</mat-toolbar>
