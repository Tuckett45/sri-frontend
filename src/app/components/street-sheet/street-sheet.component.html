<div class="street-sheet-page">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" [ngClass]="{ 'open': sidenavOpen, 'closed': !sidenavOpen }" opened="false" class="side-panel">
      <div class="side-panel-header">
        <h3 class="modal-title">Added Street Markers</h3>
        <button mat-icon-button class="close-btn" (click)="toggleSidePanel(sidenav)">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div style="align-content: space-between;" *ngFor="let streetSheet of streetSheets" (click)="selectStreetSheet(streetSheet)">
        <div class="flex">
          <h5>{{ streetSheet.vendorName }} - {{ streetSheet.segmentId }}</h5>
          <mat-icon (click)="editStreetSheet(streetSheet)" class="edit-icon">edit</mat-icon>
          <mat-icon (click)="openDeleteConfirmationDialog(streetSheet)" class="delete-icon">delete</mat-icon>
        </div>
        <ul>
          <li *ngFor="let marker of streetSheet.marker" (click)="selectMarker(marker, streetSheet)">
            {{ reversedAddresses[marker.id]?.street || (marker.latitude + ' - ' + marker.longitude) }}
          </li>
        </ul>
      </div>
    </mat-sidenav>

    <mat-sidenav-content>

      <div class="search-bar">
        <button mat-icon-button matSuffix (click)="toggleSearchBar()">
          <mat-icon>search</mat-icon>
        </button>
        <div *ngIf="searchBarOpen">
          <mat-form-field appearance="fill" class="full-width">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Search by Segment ID, Address, City, State">
          </mat-form-field>
        </div>
      </div>
      <div class="header-section">
        <div row class="header-title">
          <h2>Street Sheets</h2>
        </div>
      </div>

      <div class="marker-btns">
        <button (click)="toggleSidePanel(sidenav)" mat-raised-button>
          <mat-icon> list_alt</mat-icon> 
          Show Markers
        </button>
        <button mat-raised-button (click)="addMapMarker()">
          <mat-icon>add_location</mat-icon> 
          Add Map Marker
        </button>
        <button (click)="createStreetSheet()" mat-raised-button>
          <mat-icon>note_add</mat-icon> 
          New Street Sheet
        </button>
      </div>
      
      <street-sheet-map></street-sheet-map>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
