<h3 class="panel-title">Feature Flags</h3>
<p class="text-sm text-color-secondary mb-4">
  Toggle experimental capabilities for your workspace. Changes are saved instantly for your device.
</p>

<div class="grid gap-3">
  <div class="col-12" *ngFor="let flag of flags()">
    <div class="feature-card surface-card border-round p-3 flex align-items-center justify-content-between gap-3">
      <div class="pr-3">
        <div class="text-lg font-medium text-900">{{ flag.label }}</div>
        <p class="mt-2 mb-0 text-sm text-color-secondary">{{ flag.description }}</p>
        <span class="text-xs text-color-secondary" *ngIf="flag.isDefault">Default setting</span>
      </div>
      <div class="flex flex-column align-items-end gap-2 toggle-group">
        <div class="toggle-wrapper">
          <div class="toggle-option" [class.active]="!flag.enabled">
            <span>Off</span>
          </div>
          <div class="toggle-option" [class.active]="flag.enabled">
            <span>On</span>
          </div>
          <div
            class="toggle-indicator"
            [class.enabled]="flag.enabled"
            role="radio"
            tabindex="0"
            [attr.aria-checked]="flag.enabled"
            [attr.aria-label]="flag.label + ' ' + (flag.enabled ? 'enabled' : 'disabled')"
            (click)="onToggle(flag.key, !flag.enabled)"
            (keyup.enter)="onToggle(flag.key, !flag.enabled)"
            (keyup.space)="onToggle(flag.key, !flag.enabled)">
          </div>
        </div>
        <label class="text-xs text-color-secondary">
          {{ flag.enabled ? 'Enabled' : 'Disabled' }}
        </label>
      </div>
    </div>
  </div>
</div>

<div class="panel-footer">
  <span class="text-xs text-color-secondary">
    Flags persist locally per user. Use reset to restore recommended defaults.
  </span>
  <button
    pButton
    label="Reset to defaults"
    icon="pi pi-refresh"
    class="p-button-text"
    type="button"
    (click)="reset()"
    [disabled]="!isDirty()"
  ></button>
</div>
