<div class="surface-ground flex justify-content-center p-4">
  <p-card class="w-full md:w-9 lg:w-7" header="Feature Flags">
    <p class="text-sm text-color-secondary mb-4">
      Toggle experimental capabilities for your workspace. Changes are saved instantly for your device.
    </p>

    <div class="grid gap-3">
      <div class="col-12" *ngFor="let flag of flags()">
        <div class="feature-card surface-card border-round p-3 flex align-items-center justify-content-between">
          <div class="pr-3">
            <div class="text-lg font-medium text-900">{{ flag.label }}</div>
            <p class="mt-2 mb-0 text-sm text-color-secondary">{{ flag.description }}</p>
            <span class="text-xs text-color-secondary" *ngIf="flag.isDefault">Default setting</span>
          </div>
          <div class="flex flex-column align-items-end gap-2">
            <p-inputSwitch
              [inputId]="flag.key"
              [ngModel]="flag.enabled"
              (ngModelChange)="onToggle(flag.key, $event)"
            ></p-inputSwitch>
            <label class="text-xs text-color-secondary" [for]="flag.key">
              {{ flag.enabled ? 'Enabled' : 'Disabled' }}
            </label>
          </div>
        </div>
      </div>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center gap-3">
        <span class="text-xs text-color-secondary">
          Flags persist locally per user. Use reset to restore recommended defaults.
        </span>
        <button
          pButton
          label="Reset to defaults"
          icon="pi pi-refresh"
          class="p-button-text"
          type="button"
          (click)="reset()"
          [disabled]="!isDirty()"
        ></button>
      </div>
    </ng-template>
  </p-card>
</div>
