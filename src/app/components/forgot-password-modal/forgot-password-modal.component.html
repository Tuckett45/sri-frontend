<div mat-dialog-title class="modal-header">
    <h3 class="modal-title">Forgot Password</h3>
    <button mat-icon-button (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  
  <div mat-dialog-content class="modal-body">
    <form [formGroup]="forgotPasswordForm">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="Enter your email" />
        <mat-error *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
          Please enter a valid email.
        </mat-error>
      </mat-form-field>
    </form>
  </div>
  
  <div mat-dialog-actions class="modal-footer">
    <button mat-raised-button class="cancel-btn" (click)="close()">Cancel</button>
    <button mat-raised-button class="save-btn" (click)="onSubmit()" [disabled]="forgotPasswordForm.invalid">Submit</button>
  </div>
