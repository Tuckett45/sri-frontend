<div class="stats">
  <app-widget *ngFor="let card of statCards" [title]="card.description" [data]="card.value"></app-widget>
</div>

<div class="header-actions">
  <input type="file" accept=".csv" #csvInput (change)="importFromCSV($event)" style="display:none" />
  <button mat-raised-button class="action-btn" (click)="csvInput.click()">Import CSV</button>
  <button mat-raised-button class="action-btn" (click)="openAddEditModal()">Add Entry</button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> Metric </th>
    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
  </ng-container>

  <ng-container matColumnDef="value">
    <th mat-header-cell *matHeaderCellDef> Value </th>
    <td mat-cell *matCellDef="let element"> {{element.value}} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let element" class="actions-cell">
      <mat-icon (click)="editMetric(element)" class="edit-icon">edit</mat-icon>
      <mat-icon (click)="openDeleteConfirmationDialog(element)" class="delete-icon" color="warn">delete</mat-icon>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
