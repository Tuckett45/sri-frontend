<div class="budget-tracker">
  <div>
    <button pButton type="button" class="filters-btn p-button-raised" icon="pi pi-filter"
            iconPos="right" [label]="filtersOpen ? 'Close Filters' : 'View Filters'"
            (click)="toggleFilters()"></button>
  </div>

  <div class="chip-filter" *ngIf="filtersOpen">
    <div class="grid flex-column lg:flex-row w-full h-full">
      <div class="col-12 lg:col flex align-items-center flex-nowrap gap-1" *ngFor="let filter of selectedFilters">
        <p-chip *ngFor="let chip of filter.values"
                [label]="formatDate(chip)"
                [removable]="true"
                styleClass="mr-3 h-auto lg:h-full px-4 mt-3 lg:mt-0"
                removeIcon="pi pi-times"
                [style]="{'border-radius':'50px'}"
                (onRemove)="removeChip({column: filter.column, value: chip})">
        </p-chip>
      </div>
      <a pRipple *ngIf="selectedFilters.length > 0" tabindex="0" class="clear-all"
         style="border-radius:50px; max-width: 7rem;" (click)="clearAll()">Clear All</a>
    </div>

    <div class="filter-selections flex align-items-center gap-1" [formGroup]="form">
      <p-multiSelect styleClass="half-width" [options]="segmentOptions" formControlName="segment"
                     optionLabel="label" optionValue="value" placeholder="Filter by Segment" display="chip"
                     (onChange)="onFilterChange('segment')"></p-multiSelect>

      <p-multiSelect styleClass="half-width" [options]="cityOptions" formControlName="city"
                     optionLabel="label" optionValue="value" placeholder="Filter by City" display="chip"
                     (onChange)="onFilterChange('city')"></p-multiSelect>
    </div>
    <span>Claim Month Range Filter</span>
    <div class="filter-selections flex align-items-center gap-1" [formGroup]="form">
      <p-calendar styleClass="half-width" formControlName="claimMonthFrom" placeholder="Start Date"
                  (onSelect)="onFilterChange('claimMonth')" [showIcon]="true" dateFormat="mm/dd/yy"></p-calendar>

      <p-calendar styleClass="half-width" formControlName="claimMonthTo" placeholder="End Date"
                  (onSelect)="onFilterChange('claimMonth')" [showIcon]="true" dateFormat="mm/dd/yy"></p-calendar>
    </div>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <div class="table-wrapper" *ngIf="rows.length; else empty">
    <table mat-table [dataSource]="rows" class="mat-elevation-z8" multiTemplateDataRows matSort (matSortChange)="onSort($event)">

      <ng-container matColumnDef="expand">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button (click)="toggleRow(r); $event.stopPropagation()" aria-label="Toggle details">
            <mat-icon>{{ expandedRowId === r.Header.RowId ? 'expand_less' : 'expand_more' }}</mat-icon>
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="claim_month_year">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="ClaimMonthYear">Claim Month</th>
        <td mat-cell *matCellDef="let r">{{ asDate(r.Header?.ClaimMonthYear) }}</td>
      </ng-container>

      <ng-container matColumnDef="segment">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="Segment">Segment</th>
        <td mat-cell *matCellDef="let r">{{ r.Header?.Segment }}</td>
      </ng-container>

      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="City">City</th>
        <td mat-cell *matCellDef="let r">{{ r.Header?.City }}</td>
      </ng-container>

      <ng-container matColumnDef="vendor">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="Vendor">Vendor</th>
        <td mat-cell *matCellDef="let r">{{ r.FT?.Vendor }}</td>
      </ng-container>

      <ng-container matColumnDef="final_cost">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="FinalCost">Final Cost</th>
        <td mat-cell *matCellDef="let r">{{ r.DUEJ?.FinalCost | currency }}</td>
      </ng-container>

      <ng-container matColumnDef="expandedDetail">
        <td mat-cell *matCellDef="let r" [attr.colspan]="displayedColumns.length">
          <div class="detail-container" *ngIf="expandedRowId === r.Header.RowId">
            <p-accordion [multiple]="true">
              <p-accordionTab *ngFor="let section of detailSections(r)" [header]="section.title">
                <div class="detail-item" *ngFor="let item of objectEntries(section.data)">
                  <span class="label">{{ labelize(item.key) }}</span>
                  <span class="value" *ngIf="!isLink(item.key)">{{ item.value }}</span>
                  <a *ngIf="isLink(item.key)" [href]="item.value" target="_blank" rel="noopener">open</a>
                </div>
              </p-accordionTab>
            </p-accordion>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let r; columns: displayedColumns" class="element-row" (click)="toggleRow(r)"></tr>
      <tr mat-row *matRowDef="let r; columns: ['expandedDetail']; when: isExpandedRow" class="detail-row"></tr>
    </table>

    <mat-paginator
      [length]="total"
      [pageIndex]="0"
      [pageSize]="25"
      [pageSizeOptions]="[10,25,50,100]"
      (page)="onPage($event)">
    </mat-paginator>
  </div>

  <ng-template #empty>
    <p>No results found.</p>
  </ng-template>
</div>
