<div class="metrics-section">
  <h2>2025</h2>
  <div class="cards-grid">
    <div class="stat-card" *ngFor="let m of metrics2025">
      <div class="stat-value">{{ m.value }}</div>
      <div class="stat-label">{{ m.label }}</div>
    </div>
  </div>
</div>

<div class="metrics-section">
  <h2>2025 NON-HHHP</h2>
  <div class="cards-grid">
    <div class="stat-card" *ngFor="let m of metrics2025NonHhhp">
      <div class="stat-value">{{ m.value }}</div>
      <div class="stat-label">{{ m.label }}</div>
    </div>
  </div>
</div>
