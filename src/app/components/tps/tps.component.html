<div class="tps-page surface-card shadow-4 p-3 border-round">
  <div class="header-section">
    <h2>TPS Reports</h2><p-divider />
  </div>
  <p-tabs [(value)]="activeTab">
    <p-tablist>
      <p-tab [value]="0" [ngClass]="{ 'active-tab': activeTab === 0 }">
        Summary
      </p-tab>
      <p-tab [value]="1" [ngClass]="{ 'active-tab': activeTab === 1 }">
        Work Package Violations
      </p-tab>
      <p-tab [value]="2" [ngClass]="{ 'active-tab': activeTab === 2 }">
        City Scorecard
      </p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel [value]="0">
        <app-tps-summary></app-tps-summary>
      </p-tabpanel>
      <p-tabpanel [value]="1">
        <app-violations></app-violations>
      </p-tabpanel>
      <p-tabpanel [value]="2">
        <app-city-scorecard></app-city-scorecard>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
