<div class="tps-page surface-card shadow-4 border-round">
  <div class="header-section">
    <div class="header-content">
      <h2>TPS Reports</h2>
      <span class="context-note">Data is organized by market; add a city to narrow the view.</span>
      <div class="selectors">
        <div class="selector">
          <label for="marketSelect">Market:</label>
          <p-select
            id="marketSelect"
            [options]="markets"
            [(ngModel)]="selectedMarket"
            (onChange)="onMarketChange($event.value)"
            optionLabel="label"
            [style]="{ 'width': '170px' }"
            placeholder="Select market">
          </p-select>
        </div>
        <div class="selector">
          <label for="citySelect">City/Metro (optional):</label>
          <p-select 
            id="citySelect"
            [options]="cities" 
            [(ngModel)]="selectedCity"
            (onChange)="onCityChange($event.value)"
            optionLabel="displayName"
            [style]="{'width': '250px'}"
            placeholder="Select a city/metro">
          </p-select>
        </div>
      </div>
    </div>
    <p-divider />
  </div>

  <!-- add class="tps-tabs" so we can target these styles safely -->
  <p-tabs class="tps-tabs" [scrollable]="true" [(value)]="activeTab" (valueChange)="onTabChange($event)">
    <p-tablist>
      <p-tab [value]="0" [ngClass]="{ 'active-tab': activeTab === 0 }">Dashboard</p-tab>
      <p-tab [value]="1" [ngClass]="{ 'active-tab': activeTab === 1 }">Work Package Violations</p-tab>
      <p-tab [value]="2" [ngClass]="{ 'active-tab': activeTab === 2 }">City Scorecard</p-tab>
      <p-tab [value]="3" [ngClass]="{ 'active-tab': activeTab === 3 }">Budget Tracker</p-tab>
      <p-tab [value]="4" [ngClass]="{ 'active-tab': activeTab === 4 }">Yearly Summary Tables</p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel [value]="0"><app-tps-summary></app-tps-summary></p-tabpanel>
      <p-tabpanel [value]="1"><app-violations></app-violations></p-tabpanel>
      <p-tabpanel [value]="2"><app-city-scorecard></app-city-scorecard></p-tabpanel>
      <p-tabpanel [value]="3"><app-budget-tracker></app-budget-tracker></p-tabpanel>
      <p-tabpanel [value]="4"><app-tps-metrics></app-tps-metrics></p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
