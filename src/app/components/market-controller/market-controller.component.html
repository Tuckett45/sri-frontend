<div class="market-controller">
  <div class="header-section">
    <h2>Market Controller</h2>
    <button
      mat-raised-button
      color="primary"
      (click)="openModal()">
      Add Entry
    </button>
  </div>

  <div class="table-wrapper" *ngIf="dataSource.data.length">
    <table
      mat-table
      [dataSource]="dataSource"
      class="mat-elevation-z2"
      *ngIf="dataSource.data.length"
    >
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.type }} </td>
      </ng-container>

      <ng-container matColumnDef="poNumber">
        <th mat-header-cell *matHeaderCellDef> PO Number </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.poNumber }} </td>
      </ng-container>

      <ng-container matColumnDef="vendor">
        <th mat-header-cell *matHeaderCellDef> Vendor </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.vendor }} </td>
      </ng-container>

      <ng-container matColumnDef="segmentReason">
        <th mat-header-cell *matHeaderCellDef> Segment / Reason </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.segmentReason }} </td>
      </ng-container>

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.date | date: 'shortDate' }} </td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef> Amount </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.amount | currency }} </td>
      </ng-container>

      <ng-container matColumnDef="notes">
        <th mat-header-cell *matHeaderCellDef> Notes </th>
        <td mat-cell *matCellDef="let entry"> {{ entry.notes }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let entry">
          <button
            mat-icon-button
            color="accent"
            (click)="openModal(entry)"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="openDeleteConfirmationDialog(entry)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="5" [pageSizeOptions]="[5]" showFirstLastButtons></mat-paginator>
  </div>

  <div *ngIf="dataSource.data.length < 1" class="no-data">
    <p>No entries found. Please add a new entry.</p>

  </div>
</div>
