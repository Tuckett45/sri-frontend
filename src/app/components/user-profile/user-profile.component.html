<div class="profile-wrapper">
  <section class="profile-card surface-card border-round shadow-1">
    <header class="section-header">
      <h2>User Information</h2>
    </header>

    <dl class="profile-list">
      <div class="profile-row">
        <dt>Name</dt>
        <dd>{{ profileData.name }}</dd>
      </div>
      <div class="profile-row">
        <dt>Email</dt>
        <dd>{{ profileData.email }}</dd>
      </div>
      <div class="profile-row">
        <dt>Company</dt>
        <dd>{{ profileData.company || '—' }}</dd>
      </div>
      <div class="profile-row">
        <dt>Role</dt>
        <dd>{{ profileData.role || '—' }}</dd>
      </div>
    </dl>

    <div class="actions">
      <button mat-raised-button (click)="openEditModal()">Edit Profile</button>
    </div>
  </section>

  <section class="settings-card surface-card border-round shadow-1">
    <header class="section-header">
      <h2>User Settings</h2>
    </header>

    <app-feature-flag-panel></app-feature-flag-panel>
  </section>
</div>
