<div mat-dialog-title class="modal-header">
    <h3 class="modal-title">Edit Profile</h3>
    <button mat-icon-button (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  
  <div mat-dialog-content class="modal-body">
    <form [formGroup]="editProfileForm">
  
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" placeholder="Enter your name" />
        <mat-error *ngIf="editProfileForm.get('name')?.invalid && editProfileForm.get('name')?.touched">
          Name is required.
        </mat-error>
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="Enter your email" />
        <mat-error *ngIf="editProfileForm.get('email')?.invalid && editProfileForm.get('email')?.touched">
          Please enter a valid email.
        </mat-error>
      </mat-form-field>
  
    </form>
  </div>
  
  <div mat-dialog-actions class="modal-footer">
    <button mat-raised-button class="cancel-btn" (click)="close()">Cancel</button>
    <!-- editProfileForm.invalid -->
    <button mat-raised-button class="save-btn" (click)="saveChanges()" [disabled]="true">Save</button>
  </div>
