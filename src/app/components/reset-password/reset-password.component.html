<div class="reset-password-page">
  <div class="reset-card">
    <h2 class="reset-password-header">Reset Your Password</h2>
    
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
      <div mat-dialog-content class="reset-password-body">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>New Password</mat-label>
          <input matInput type="password" formControlName="newPassword" placeholder="Enter new password">
          <mat-error *ngIf="resetPasswordForm.get('newPassword')?.hasError('required')">
            Password is required.
          </mat-error>
        </mat-form-field>
    
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput type="password" formControlName="confirmPassword" placeholder="Confirm new password">
          <mat-error *ngIf="resetPasswordForm.get('confirmPassword')?.hasError('required')">
            Confirm password is required.
          </mat-error>
          <mat-error *ngIf="this.passwordsMatch">
            Passwords must match.
          </mat-error>
        </mat-form-field>
      </div>
      <button mat-raised-button class="full-width-btn" type="submit" [disabled]="resetPasswordForm.invalid">Reset Password</button>
    </form>
  
    <div *ngIf="resetSuccessful" class="success-message">
      Password reset successfully! You can now <a href="/login">log in</a>.
    </div>
  </div>
</div>
