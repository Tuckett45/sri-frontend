<div mat-dialog-title class="modal-header">
  <h3 class="modal-title">Preliminary Punch List Report</h3>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div mat-dialog-content class="modal-body">
  <form [formGroup]="preliminaryPunchListForm">

    <mat-grid-list cols="4" rowHeight="115px" gutterSize="2px">

      <!-- Segment ID -->
      <mat-grid-tile colspan="2">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Segment ID</mat-label>
          <input matInput formControlName="segmentId" placeholder="Enter Segment ID">
        </mat-form-field>
      </mat-grid-tile>

      <mat-grid-tile colspan="2">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Vendor</mat-label>
          <input matInput formControlName="vendorName" placeholder="Enter Vendor">
        </mat-form-field>
      </mat-grid-tile>

      <!-- Street Address -->
      <mat-grid-tile colspan="4">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Street Address</mat-label>
          <input matInput formControlName="streetAddress" placeholder="Enter Street Address">
        </mat-form-field>
      </mat-grid-tile>

      <!-- City -->
      <mat-grid-tile colspan="2">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>City</mat-label>
          <input matInput formControlName="city" placeholder="Enter City">
        </mat-form-field>
      </mat-grid-tile>

      <!-- State -->
      <mat-grid-tile colspan="2">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>State</mat-label>
          <input matInput formControlName="state" placeholder="Enter State">
        </mat-form-field>
      </mat-grid-tile>

      <!-- Issue Areas and Quality Issues -->
      <div formArrayName="issues" *ngFor="let issueArea of issueAreasFormArray.controls; let i = index">
        <div [formGroupName]="i">
          <mat-grid-tile colspan="2">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Issue Area</mat-label>
              <mat-select formControlName="area" placeholder="Select Issue Area" (selectionChange)="onIssueAreaChange(i)">
                <mat-option *ngFor="let area of issueAreaList" [value]="area">{{ area }}</mat-option>
              </mat-select>
            </mat-form-field>
          </mat-grid-tile>

          <!-- Quality Issues for Selected Area -->
          <mat-grid-tile colspan="2">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Quality Issues</mat-label>
              <mat-select formControlName="qualityIssues" multiple placeholder="Select Quality Issues">
                <mat-option *ngFor="let issue of getQualityIssues(i)" [value]="issue">{{ issue }}</mat-option>
              </mat-select>
            </mat-form-field>
          </mat-grid-tile>
        </div>
      </div>
      
      <!-- Button to Add Another Issue Area -->
      <mat-grid-tile colspan="4" class="half-width">
        <button mat-stroked-button class="issue-btn" (click)="addIssueArea()">Add Issue</button>
      </mat-grid-tile>

      <!-- Additional Concerns -->
      <mat-grid-tile colspan="4">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Additional Concerns</mat-label>
          <textarea matInput formControlName="additionalConcerns" placeholder="Enter Additional Concerns"></textarea>
        </mat-form-field>
      </mat-grid-tile>

      <!-- Issue Image -->
      <mat-grid-tile colspan="4">
        <div class="file-input-wrapper">
          <label class="custom-label">Issue Image</label>
          <input type="file" (change)="uploadIssueImage($event)" class="file-input">
        </div>
      </mat-grid-tile>      

      <mat-grid-tile colspan="2" *ngIf="isEditMode">
        <div class="checkbox-container">
          <mat-checkbox formControlName="pmResolved">PM Resolved</mat-checkbox>
        </div>
      </mat-grid-tile>

      <mat-grid-tile colspan="2" *ngIf="isEditMode && preliminaryPunchListForm.get('pmResolved')?.value">
        <div class="file-input-wrapper">
          <label class="custom-label">Resolution Image</label>
          <input type="file" (change)="uploadResolutionImage($event)" class="file-input">
        </div>
      </mat-grid-tile>

      <mat-grid-tile colspan="2" *ngIf="isEditMode">
        <div class="checkbox-container">
          <mat-checkbox formControlName="cmResolved">CM Resolved</mat-checkbox>
        </div>
      </mat-grid-tile>

    </mat-grid-list> 

  </form>
</div>

<div mat-dialog-actions class="modal-footer">
  <button mat-raised-button class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button class="save-btn" (click)="save()">Save</button>
</div>
