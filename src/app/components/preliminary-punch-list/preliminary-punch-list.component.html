<div class="preliminary-punch-list-page surface-card shadow-4 p-3 border-round">
  <div class="header-section">
    <h2>Preliminary Punch List</h2>
    <button *ngIf="this.user.role === 'CM' || this.user.role === 'Admin'" mat-raised-button color="primary" class="header-btn" (click)="openModal()">Add New Entry</button>
  </div>

  <div class="filter-section">
    <div class="search-bar">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Search</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Search by Segment ID, Address, City, State">
        <button mat-icon-button matSuffix>
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </div>   
  </div>

  <div class="chip-filter">
    <div class="grid flex-column lg:flex-row w-full h-full">
      <div class="col-12 lg:col flex align-items-center flex-nowrap gap-1" *ngFor="let filter of selectedFilters">
        <p-chip *ngFor="let chip of filter.values" 
                [label]="chip" 
                [removable]="true"
                styleClass="mr-3 h-auto lg:h-full px-4 mt-3 lg:mt-0" 
                removeIcon="pi pi-times"
                [style]="{'border-radius':'50px'}" 
                (onRemove)="removeChip({column: filter.column, value: chip})">
        </p-chip>
      </div>
      <a pRipple *ngIf="selectedFilters.length > 0" tabindex="0" class="clear-all"
         style="border-radius:50px; max-width: 7rem;" (click)="clearAll()">Clear All</a>
    </div>
    
    <div class="filter-selections flex align-items-center gap-1">
      <mat-form-field appearance="fill" class="half-width">
        <mat-label>Filter by Segment ID</mat-label>
        <mat-select [multiple]="true" [(ngModel)]="this.selectedSegmentIds"
                    (selectionChange)="onFilterChange({ column: 'segmentId', values: selectedSegmentIds })">
          <mat-option *ngFor="let option of filterOptions.segmentId" [value]="option">{{ option }}</mat-option>
        </mat-select>
      </mat-form-field>
      
      <mat-form-field appearance="fill" class="half-width">
        <mat-label>Filter by Vendor</mat-label>
        <mat-select [multiple]="true" [(ngModel)]="this.selectedVendors"
                    (selectionChange)="onFilterChange({ column: 'vendorName', values: selectedVendors })">
          <mat-option *ngFor="let option of filterOptions.vendorName" [value]="option">{{ option }}</mat-option>
        </mat-select>
      </mat-form-field>
      
      <mat-form-field appearance="fill" class="half-width">
        <mat-label>Filter by State</mat-label>
        <mat-select [multiple]="true" [(ngModel)]="this.selectedStates"
                    (selectionChange)="onFilterChange({ column: 'state', values: selectedStates })">
          <mat-option *ngFor="let option of filterOptions.state" [value]="option">{{ option }}</mat-option>
        </mat-select>
      </mat-form-field>
      
    </div>
  </div>
  

  <div class="card table-wrapper">
    <p-tabs [(value)]="activeTab">
      <p-tablist>
        <p-tab [value]="0" [ngClass]="{ 'active-tab': activeTab === 0 }">
          <span *ngIf="user.role === 'CM'">
            CM Resolved Gigs 
          </span>
          <span *ngIf="user.role === 'PM'">
            PM Resolved Gigs 
          </span>
          <span *ngIf="user.role === 'Admin' || user.role === 'Client'">
            Resolved Gigs 
          </span>
          <p-overlaybadge [value]="resolvedPunchListCount">
            <i class="pi pi-check"></i>
          </p-overlaybadge>
        </p-tab>
        <p-tab [value]="1" [ngClass]="{ 'active-tab': activeTab === 1 }">
          <span *ngIf="user.role === 'CM'">
            CM Unresolved Gigs 
          </span>
          <span *ngIf="user.role === 'PM'">
            PM Unresolved Gigs 
          </span>
          <span *ngIf="user.role === 'Admin' || user.role === 'Client'">
            Unresolved Gigs 
          </span>
          <p-overlaybadge [value]="unresolvedPunchListCount">
            <i class="pi pi-wrench"></i>
          </p-overlaybadge>
        </p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel [value]="0">
          <preliminary-punch-list-resolved [selectedFilters]="selectedFilters" 
          (resolvedCountChange)="onResolvedCountChange($event)"/>
        </p-tabpanel>
        <p-tabpanel [value]="1">
          <preliminary-punch-list-unresolved [selectedFilters]="selectedFilters" 
          (unresolvedCountChange)="onUnresolvedCountChange($event)"/>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>


</div>
