<div class="preliminary-punch-list-page surface-card shadow-4 p-3 border-round">
  <div class="header-section">
    <h2>Preliminary Punch List</h2>
    <button *ngIf="this.authService.isCM()" mat-raised-button color="primary" class="header-btn" (click)="openModal()">Add New Entry</button>
  </div>

  <div class="search-bar">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Search by Segment ID, Address, City, State">
      <button mat-icon-button matSuffix>
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <p-tabView>
    <p-tabPanel header="Unresolved Punch Lists">
      <unresolved-punch-list></unresolved-punch-list> 
    </p-tabPanel>

    <p-tabPanel header="Resolved Punch Lists">
      <resolved-punch-list></resolved-punch-list>
    </p-tabPanel>
  </p-tabView>
</div>
