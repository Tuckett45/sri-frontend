<div mat-dialog-title class="modal-header">
  <h3 class="modal-title">{{ data ? 'Edit Entry' : 'Add Entry' }}</h3>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="modal-body">
  <form [formGroup]="statForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description" />
      <mat-error *ngIf="statForm.get('description')?.invalid && statForm.get('description')?.touched">
        Description is required.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Value</mat-label>
      <input matInput type="number" formControlName="value" />
      <mat-error *ngIf="statForm.get('value')?.invalid && statForm.get('value')?.touched">
        Value must be 0 or greater.
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="modal-footer">
  <button mat-raised-button class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button class="save-btn" (click)="save()" [disabled]="statForm.invalid">Save</button>
</mat-dialog-actions>
