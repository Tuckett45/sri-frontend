<div mat-dialog-title class="modal-header">
  <h5 class="modal-title">Market Controller Entry</h5>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div mat-dialog-content class="modal-body">
  <form [formGroup]="entryForm" class="entry-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
      </mat-select>
      <mat-error *ngIf="entryForm.get('type')?.invalid && entryForm.get('type')?.touched">
        Type is required
      </mat-error>
    </mat-form-field>

    <mat-grid-list cols="4" rowHeight="115px" gutterSize="2px">
      <ng-container *ngFor="let field of entryForm.controls | keyvalue">
        <mat-grid-tile *ngIf="field.key !== 'type'" [colspan]="getColSpan(field.key)">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ getLabel(field.key) }}</mat-label>

            <input
              *ngIf="field.key !== 'date' && field.key !== 'notes' && field.key !== 'amount' && field.key !== 'vendor'"
              matInput
              [formControlName]="field.key"
            />

            <mat-select *ngIf="field.key === 'vendor'" formControlName="vendor" placeholder="Select a Vendor">
              <mat-option *ngFor="let vendor of vendors" [value]="vendor">{{ vendor }}</mat-option>
            </mat-select>

            <input
              *ngIf="field.key === 'amount'"
              matInput
              [currencyMask]="{ prefix: '$ ', thousands: ',', decimal: '.', align: 'left', allowZero: true, precision: 2 }"
              [formControlName]="field.key"
            />
            <input
              *ngIf="field.key === 'date'"
              matInput
              [matDatepicker]="picker"
              [formControlName]="field.key"
            />
            <mat-datepicker-toggle *ngIf="field.key === 'date'" matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <textarea
              *ngIf="field.key === 'notes'"
              matInput
              [formControlName]="field.key"
              rows="3"
            ></textarea>

            <mat-error *ngIf="entryForm.get(field.key)?.invalid && entryForm.get(field.key)?.touched">
              {{ getLabel(field.key) }} is required
            </mat-error>
          </mat-form-field>
        </mat-grid-tile>
      </ng-container>
    </mat-grid-list>
  </form>
</div>

<div mat-dialog-actions class="modal-footer">
  <button mat-raised-button class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button class="save-btn" (click)="save()" [disabled]="entryForm.invalid">Save</button>
</div>
