<div mat-dialog-title class="modal-header">
  <h5 class="modal-title">Market Controller Entry</h5>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div mat-dialog-content class="modal-body">
  <form [formGroup]="entryForm" class="entry-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
      </mat-select>
      <mat-error *ngIf="entryForm.get('type')?.invalid && entryForm.get('type')?.touched">
        Type is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>PO Number</mat-label>
      <input matInput formControlName="poNumber" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Vendor</mat-label>
      <mat-select formControlName="vendor" placeholder="Select a Vendor">
        <mat-option *ngFor="let vendor of vendors" [value]="vendor">{{ vendor }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Segment / Reason</mat-label>
      <input matInput formControlName="segmentReason" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="entryForm.get('date')?.invalid && entryForm.get('date')?.touched">
        Date is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Amount</mat-label>
      <input
        matInput
        [currencyMask]="{ prefix: '$ ', thousands: ',', decimal: '.', align: 'left', allowZero: true, precision: 2 }"
        formControlName="amount"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>
  </form>
</div>

<div mat-dialog-actions class="modal-footer">
  <button mat-raised-button class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button class="save-btn" (click)="save()" [disabled]="entryForm.invalid">Save</button>
</div>
