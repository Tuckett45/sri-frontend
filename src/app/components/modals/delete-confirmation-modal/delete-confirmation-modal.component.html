<div mat-dialog-title class="modal-header">
    <h5 class="modal-title">Confirm Deletion</h5>
    <button mat-icon-button (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content class="modal-body">
  Are you sure you want to delete this item? This action cannot be undone.
</mat-dialog-content>

<mat-dialog-actions class="modal-footer">
    <button mat-raised-button class="cancel-btn" (click)="cancel()">Cancel</button>
  <button mat-raised-button class="delete-btn" (click)="confirm()">Delete</button>
</mat-dialog-actions>
