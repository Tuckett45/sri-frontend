<div mat-dialog-title class="modal-header">
  <h3 class="modal-title">Add Expense</h3>
  <button mat-icon-button type="button" (click)="close()" aria-label="Close">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div mat-dialog-content class="modal-body">
  <form [formGroup]="expenseForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Job</mat-label>
      <mat-select formControlName="job">
        <mat-option *ngFor="let job of jobs" [value]="job">{{ job }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phase</mat-label>
      <mat-select formControlName="phase">
        <mat-option *ngFor="let phase of phases" [value]="phase">{{ phase }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Expense Type</mat-label>
      <mat-select formControlName="expenseType">
        <mat-option *ngFor="let type of expenseTypes" [value]="type">{{ type }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Amount</mat-label>
      <input
        matInput
        [currencyMask]="{ prefix: '$ ', thousands: ',', decimal: '.', align: 'left', allowZero: true, precision: 2 }"
        formControlName="amount" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes"></textarea>
    </mat-form-field>

    <!-- Upload button (no image yet) -->
    <div *ngIf="!receiptBase64" class="file-input-wrapper">
      <label class="custom-label">Receipt</label>
      <button
        mat-raised-button
        type="button"
        class="image-btn"
        (click)="fileInput.click()">
        Upload Receipt
        <mat-icon>attach_file</mat-icon>
      </button>
      <input
        type="file"
        #fileInput
        accept="image/*"
        (change)="onFileChange($event)"
        hidden>
    </div>

    <!-- Preview block -->
    <div *ngIf="receiptBase64" class="file-preview">
      <div style="display: flex; flex-direction: column;">
        <!-- Use sanitized URL from component -->
        <img
          [src]="receiptSafeUrl || receiptBase64"
          alt="Receipt preview"
          (click)="openGallery()"
          class="preview-image">
        <span class="image-label">Receipt</span>
      </div>
      <button mat-icon-button type="button" class="delete-icon" (click)="removeImage()" aria-label="Remove receipt">
        <mat-icon>delete</mat-icon>
      </button>

      <p-galleria
        *ngIf="isGalleryVisible"
        [value]="galleryImages"
        [(visible)]="isGalleryVisible"
        [containerStyle]="{ 'max-width': '80%' }"
        [circular]="true"
        [fullScreen]="true"
        [transitionInterval]="1500"
        [showItemNavigators]="true"
        [showThumbnails]="true">
        <ng-template pTemplate="item" let-item>
          <div style="display: flex; justify-content: center; align-items: center;">
            <img [src]="item.itemImageSrc"
                 style="max-width: 80%; max-height: 1000px; object-fit: contain; display: block; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,.2);" />
          </div>
        </ng-template>
        <ng-template pTemplate="thumbnail" let-item>
          <div style="display: flex; justify-content: center; align-items: center;">
            <img [src]="item.itemImageSrc"
                 style="width: 80px; height: 80px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 2px solid #ddd;" />
          </div>
        </ng-template>
      </p-galleria>
    </div>
  </form>
</div>

<div mat-dialog-actions class="modal-footer">
  <button mat-raised-button type="button" class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button type="button" class="save-btn" (click)="save()" [disabled]="expenseForm.invalid">Save</button>
</div>
