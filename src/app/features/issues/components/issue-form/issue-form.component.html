<div class="issue-form-container">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">
        <i class="pi pi-exclamation-triangle" *ngIf="isCreateMode"></i>
        <i class="pi pi-pencil" *ngIf="isEditMode"></i>
        {{ isCreateMode ? 'Report Issue' : 'Edit Issue' }}
      </h3>
    </div>
    
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Title -->
        <div class="form-group mb-3">
          <label for="title" class="form-label required">Title</label>
          <input
            type="text"
            id="title"
            class="form-control"
            formControlName="title"
            placeholder="Brief description of the issue"
            [class.is-invalid]="isFieldInvalid('title')"
          />
          <div class="invalid-feedback" *ngIf="isFieldInvalid('title')">
            {{ getFieldError('title') }}
          </div>
        </div>

        <!-- Description -->
        <div class="form-group mb-3">
          <label for="description" class="form-label required">Description</label>
          <textarea
            id="description"
            class="form-control"
            formControlName="description"
            rows="4"
            placeholder="Detailed description of the issue, including steps to reproduce if applicable"
            [class.is-invalid]="isFieldInvalid('description')"
          ></textarea>
          <div class="invalid-feedback" *ngIf="isFieldInvalid('description')">
            {{ getFieldError('description') }}
          </div>
        </div>

        <!-- Priority -->
        <div class="form-group mb-3">
          <label for="priority" class="form-label required">Priority</label>
          <select
            id="priority"
            class="form-select"
            formControlName="priority"
            [class.is-invalid]="isFieldInvalid('priority')"
          >
            <option *ngFor="let option of priorityOptions" [value]="option.value">
              {{ option.label }}
            </option>
          </select>
          <div class="invalid-feedback" *ngIf="isFieldInvalid('priority')">
            {{ getFieldError('priority') }}
          </div>
        </div>

        <!-- Status (Edit mode only) -->
        <div class="form-group mb-3" *ngIf="canEditStatus">
          <label for="status" class="form-label">Status</label>
          <select
            id="status"
            class="form-select"
            formControlName="status"
          >
            <option *ngFor="let option of statusOptions" [value]="option.value">
              {{ option.label }}
            </option>
          </select>
        </div>

        <!-- Assigned To -->
        <div class="form-group mb-3">
          <label for="assignedTo" class="form-label">Assigned To</label>
          <input
            type="text"
            id="assignedTo"
            class="form-control"
            formControlName="assignedTo"
            placeholder="Deployment Engineer ID (optional - will auto-assign if empty)"
          />
          <small class="form-text text-muted">
            Leave empty to automatically assign to the deployment engineer
          </small>
        </div>

        <!-- Resolution Notes (Edit mode only, when resolved) -->
        <div class="form-group mb-3" *ngIf="showResolutionNotes">
          <label for="resolutionNotes" class="form-label">Resolution Notes</label>
          <textarea
            id="resolutionNotes"
            class="form-control"
            formControlName="resolutionNotes"
            rows="3"
            placeholder="Describe how the issue was resolved"
          ></textarea>
        </div>

        <!-- File Upload -->
        <div class="form-group mb-4">
          <label for="files" class="form-label">Attachments</label>
          <input
            type="file"
            id="files"
            class="form-control"
            multiple
            accept="image/*,.pdf,.doc,.docx"
            (change)="onFileSelected($event)"
          />
          <small class="form-text text-muted">
            Upload images or documents related to this issue (max 10MB per file)
          </small>
        </div>

        <!-- Form Actions -->
        <div class="form-actions d-flex justify-content-end gap-2">
          <button
            type="button"
            class="btn btn-secondary"
            (click)="onCancel()"
            [disabled]="isSubmitting"
          >
            <i class="pi pi-times"></i>
            Cancel
          </button>
          
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="form.invalid || isSubmitting"
          >
            <i class="pi pi-spin pi-spinner" *ngIf="isSubmitting"></i>
            <i class="pi pi-check" *ngIf="!isSubmitting"></i>
            {{ isCreateMode ? 'Create Issue' : 'Update Issue' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
