<div class="punch-list">
  <form class="form" [formGroup]="form">
    <input pInputText type="text" placeholder="Add punch item" formControlName="description" />
    <input pInputText type="text" placeholder="Owner" formControlName="owner" />
    <button pButton type="button" label="Add" icon="pi pi-plus" size="small" (click)="add()"></button>
  </form>

  <p-table [value]="items()" *ngIf="items().length; else emptyState" dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th>Description</th>
        <th>Owner</th>
        <th>Status</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>{{ item.description }}</td>
        <td>{{ item.owner }}</td>
        <td>
          <p-tag [value]="item.resolvedAt ? 'Resolved' : 'Open'" [severity]="item.resolvedAt ? 'success' : 'warn'"></p-tag>
        </td>
        <td>
          <button
            pButton
            type="button"
            label="Resolve"
            icon="pi pi-check"
            size="small"
            [disabled]="item.resolvedAt"
            (click)="resolve(item)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <ng-template #emptyState>
    <p>No punch items yet.</p>
  </ng-template>
</div>
