<mat-card class="legend-card">
  <mat-card-header>
    <mat-card-title>Legend</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="legend-items">
      <div class="legend-item" *ngFor="let item of legendItems">
        <mat-icon [style.color]="item.color">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </div>
    </div>
  </mat-card-content>
</mat-card>
