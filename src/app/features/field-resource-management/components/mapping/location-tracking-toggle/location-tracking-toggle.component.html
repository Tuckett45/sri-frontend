<div class="tracking-toggle">
  <mat-icon [color]="trackingEnabled ? 'primary' : ''">
    {{ trackingEnabled ? 'location_on' : 'location_off' }}
  </mat-icon>
  <span class="status-label">
    {{ trackingEnabled ? 'Tracking Active' : 'Location Off' }}
  </span>
  <mat-slide-toggle
    [checked]="trackingEnabled"
    (change)="toggleTracking()"
    [color]="'primary'">
  </mat-slide-toggle>
  <span class="denied-msg" *ngIf="trackingStatus === 'denied'">
    <mat-icon color="warn" style="font-size:16px;">error</mat-icon> Permission denied
  </span>
</div>
