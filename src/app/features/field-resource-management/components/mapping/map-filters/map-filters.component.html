<div class="map-filters">
  <div class="filters-header">
    <h3>Filters</h3>
    <button mat-button color="warn" (click)="resetFilters()">Reset</button>
  </div>

  <form [formGroup]="form">
    <mat-divider></mat-divider>
    <div class="filter-section">
      <p class="section-label">Show on Map</p>
      <mat-slide-toggle formControlName="showTechnicians">Technicians</mat-slide-toggle>
      <mat-slide-toggle formControlName="showJobs">Job Sites</mat-slide-toggle>
    </div>

    <mat-divider></mat-divider>
    <div class="filter-section">
      <p class="section-label">Technician Status</p>
      <mat-selection-list formControlName="statuses">
        <mat-list-option *ngFor="let s of statuses" [value]="s">
          {{ s | titlecase }}
        </mat-list-option>
      </mat-selection-list>
    </div>

    <mat-divider></mat-divider>
    <div class="filter-section" *ngIf="markets.length > 0">
      <p class="section-label">Market</p>
      <mat-selection-list formControlName="markets">
        <mat-list-option *ngFor="let m of markets" [value]="m">{{ m }}</mat-list-option>
      </mat-selection-list>
    </div>
  </form>
</div>
