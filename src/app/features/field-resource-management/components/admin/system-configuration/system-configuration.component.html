<mat-card class="system-config-card">
  <mat-card-header>
    <mat-card-title>System Configuration</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-tab-group>
      <!-- General Tab -->
      <mat-tab label="General">
        <div class="tab-content">
          <form [formGroup]="generalForm" class="config-form">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Company Name</mat-label>
              <input matInput formControlName="companyName">
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Timezone</mat-label>
              <mat-select formControlName="timezone">
                <mat-option *ngFor="let tz of timezones" [value]="tz">{{ tz }}</mat-option>
              </mat-select>
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Date Format</mat-label>
              <mat-select formControlName="dateFormat">
                <mat-option *ngFor="let fmt of dateFormats" [value]="fmt">{{ fmt }}</mat-option>
              </mat-select>
            </mat-form-field>
            <div class="tab-actions">
              <button mat-raised-button color="primary" type="button" (click)="saveGeneral()">
                <mat-icon>save</mat-icon> Save
              </button>
            </div>
          </form>
        </div>
      </mat-tab>

      <!-- Notifications Tab -->
      <mat-tab label="Notifications">
        <div class="tab-content">
          <form [formGroup]="notificationsForm" class="config-form">
            <div class="toggle-row">
              <span>Email Notifications</span>
              <mat-slide-toggle formControlName="emailEnabled" color="primary"></mat-slide-toggle>
            </div>
            <div class="toggle-row">
              <span>SMS Notifications</span>
              <mat-slide-toggle formControlName="smsEnabled" color="primary"></mat-slide-toggle>
            </div>
            <div class="tab-actions">
              <button mat-raised-button color="primary" type="button" (click)="saveNotifications()">
                <mat-icon>save</mat-icon> Save
              </button>
            </div>
          </form>
        </div>
      </mat-tab>

      <!-- Integrations Tab -->
      <mat-tab label="Integrations">
        <div class="tab-content">
          <form [formGroup]="integrationsForm" class="config-form">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>API URL</mat-label>
              <input matInput formControlName="apiUrl" placeholder="https://api.example.com">
            </mat-form-field>
            <div class="toggle-row">
              <span>SignalR Enabled</span>
              <mat-slide-toggle formControlName="signalrEnabled" color="primary"></mat-slide-toggle>
            </div>
            <div class="tab-actions">
              <button mat-raised-button color="primary" type="button" (click)="saveIntegrations()">
                <mat-icon>save</mat-icon> Save
              </button>
            </div>
          </form>
        </div>
      </mat-tab>
    </mat-tab-group>
  </mat-card-content>
</mat-card>
