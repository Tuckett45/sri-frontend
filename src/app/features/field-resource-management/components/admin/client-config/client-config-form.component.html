<mat-card class="client-config-form-card">
  <mat-card-header>
    <mat-card-title>Client Configuration</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="clientConfigForm" class="client-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Client Name</mat-label>
        <input matInput formControlName="clientName">
        <mat-error *ngIf="clientConfigForm.get('clientName')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Billing Type</mat-label>
        <mat-select formControlName="billingType">
          <mat-option *ngFor="let bt of billingTypes" [value]="bt">{{ bt }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Rate</mat-label>
        <input matInput type="number" formControlName="rate" min="0">
        <span matPrefix>$&nbsp;</span>
        <mat-error *ngIf="clientConfigForm.get('rate')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contact Email</mat-label>
        <input matInput type="email" formControlName="contactEmail">
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="clientConfigForm.get('contactEmail')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="clientConfigForm.get('contactEmail')?.hasError('email')">Invalid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Notes</mat-label>
        <textarea matInput formControlName="notes" rows="3"></textarea>
      </mat-form-field>
    </form>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()" [disabled]="clientConfigForm.invalid">
      <mat-icon>save</mat-icon> Save
    </button>
  </mat-card-actions>
</mat-card>
