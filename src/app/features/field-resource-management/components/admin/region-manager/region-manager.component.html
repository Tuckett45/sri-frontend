<mat-card class="region-manager-card">
  <mat-card-header>
    <mat-card-title>Region Manager</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="toolbar">
      <button mat-raised-button color="primary" (click)="openForm()">
        <mat-icon>add</mat-icon> Add Region
      </button>
    </div>

    <mat-expansion-panel *ngIf="showForm" [expanded]="true" class="region-form-panel">
      <mat-expansion-panel-header>
        <mat-panel-title>{{ editingRegion ? 'Edit Region' : 'New Region' }}</mat-panel-title>
      </mat-expansion-panel-header>
      <form [formGroup]="regionForm" (ngSubmit)="onSubmit()" class="region-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Region Name</mat-label>
          <input matInput formControlName="name">
          <mat-error *ngIf="regionForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>States (comma-separated)</mat-label>
          <input matInput formControlName="states" placeholder="e.g. GA, FL, AL">
        </mat-form-field>
        <mat-slide-toggle formControlName="active" color="primary">Active</mat-slide-toggle>
        <div class="form-actions">
          <button mat-button type="button" (click)="closeForm()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="regionForm.invalid">
            <mat-icon>save</mat-icon> Save
          </button>
        </div>
      </form>
    </mat-expansion-panel>

    <mat-table [dataSource]="regions" class="regions-table">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Region</mat-header-cell>
        <mat-cell *matCellDef="let r">{{ r.name }}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="states">
        <mat-header-cell *matHeaderCellDef>States</mat-header-cell>
        <mat-cell *matCellDef="let r">
          <mat-chip-set>
            <mat-chip *ngFor="let s of r.states">{{ s }}</mat-chip>
          </mat-chip-set>
        </mat-cell>
      </ng-container>
      <ng-container matColumnDef="active">
        <mat-header-cell *matHeaderCellDef>Active</mat-header-cell>
        <mat-cell *matCellDef="let r">
          <mat-slide-toggle [(ngModel)]="r.active" color="primary"></mat-slide-toggle>
        </mat-cell>
      </ng-container>
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let r">
          <button mat-icon-button color="primary" (click)="openForm(r)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteRegion(r)"><mat-icon>delete</mat-icon></button>
        </mat-cell>
      </ng-container>
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>
  </mat-card-content>
</mat-card>
