<div class="template-manager-container">
  <div class="header">
    <h2>Job Template Manager</h2>
    <button mat-raised-button class="btn-orange" (click)="onCreateTemplate()">
      <mat-icon>add</mat-icon>
      Create Template
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="templates-table">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Template Name</th>
          <td mat-cell *matCellDef="let template">{{ template.name }}</td>
        </ng-container>

        <!-- Job Type Column -->
        <ng-container matColumnDef="jobType">
          <th mat-header-cell *matHeaderCellDef>Job Type</th>
          <td mat-cell *matCellDef="let template">{{ template.jobType }}</td>
        </ng-container>

        <!-- Required Skills Column -->
        <ng-container matColumnDef="requiredSkills">
          <th mat-header-cell *matHeaderCellDef>Required Skills</th>
          <td mat-cell *matCellDef="let template">
            <mat-chip-set>
              <mat-chip *ngFor="let skill of template.requiredSkills" [disabled]="true">
                {{ skill.name }}
              </mat-chip>
            </mat-chip-set>
          </td>
        </ng-container>

        <!-- Estimated Hours Column -->
        <ng-container matColumnDef="estimatedHours">
          <th mat-header-cell *matHeaderCellDef>Est. Hours</th>
          <td mat-cell *matCellDef="let template">{{ template.estimatedHours }}</td>
        </ng-container>

        <!-- Crew Size Column -->
        <ng-container matColumnDef="crewSize">
          <th mat-header-cell *matHeaderCellDef>Crew Size</th>
          <td mat-cell *matCellDef="let template">{{ template.crewSize }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let template">
            <button mat-icon-button [matMenuTriggerFor]="actionMenu" aria-label="Actions">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #actionMenu="matMenu">
              <button mat-menu-item (click)="onPreviewTemplate(template)">
                <mat-icon>visibility</mat-icon>
                <span>Preview</span>
              </button>
              <button mat-menu-item (click)="onCreateJobFromTemplate(template)">
                <mat-icon>add_circle</mat-icon>
                <span>Create Job from Template</span>
              </button>
              <button mat-menu-item (click)="onEditTemplate(template)">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button mat-menu-item (click)="onDeleteTemplate(template)">
                <mat-icon color="warn">delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- No data row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            <div class="empty-state">
              <mat-icon>description</mat-icon>
              <p>No job templates found</p>
              <button mat-raised-button class="btn-orange" (click)="onCreateTemplate()">
                Create First Template
              </button>
            </div>
          </td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
