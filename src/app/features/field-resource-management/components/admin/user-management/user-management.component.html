<mat-card class="user-management-card">
  <mat-card-header>
    <mat-card-title>User Management</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="toolbar">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search users</mat-label>
        <input matInput [(ngModel)]="searchQuery" placeholder="Name or email...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="inviteUser()">
        <mat-icon>person_add</mat-icon> Invite User
      </button>
    </div>

    <ng-container *ngIf="filteredUsers.length > 0; else emptyState">
      <table mat-table [dataSource]="filteredUsers" class="users-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let user">{{ user.name }}</td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email }}</td>
        </ng-container>
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let user">
            <mat-chip>{{ user.role }}</mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let user">
            <span [class]="'status-badge status-' + user.status.toLowerCase()">{{ user.status }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let user">
            <button mat-icon-button color="warn" (click)="deactivateUser(user.id)" [disabled]="user.status === 'Inactive'" matTooltip="Deactivate">
              <mat-icon>block</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>people</mat-icon>
        <p>No users found.</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
