<mat-card class="audit-log-card">
  <mat-card-header>
    <mat-card-title>Audit Log</mat-card-title>
    <div class="header-actions">
      <button mat-stroked-button (click)="exportLogs()">
        <mat-icon>download</mat-icon> Export
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="filterForm" class="filter-bar">
      <mat-form-field appearance="outline">
        <mat-label>From Date</mat-label>
        <input matInput [matDatepicker]="fromPicker" formControlName="dateFrom">
        <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
        <mat-datepicker #fromPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>To Date</mat-label>
        <input matInput [matDatepicker]="toPicker" formControlName="dateTo">
        <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
        <mat-datepicker #toPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>User</mat-label>
        <input matInput formControlName="user" placeholder="Search user...">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Action</mat-label>
        <mat-select formControlName="action">
          <mat-option value="">All</mat-option>
          <mat-option *ngFor="let a of actionOptions" [value]="a">{{ a }}</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="filter-actions">
        <button mat-raised-button color="primary" type="button" (click)="applyFilters()">
          <mat-icon>filter_list</mat-icon> Filter
        </button>
        <button mat-stroked-button type="button" (click)="clearFilters()">
          <mat-icon>clear</mat-icon> Clear
        </button>
      </div>
    </form>

    <ng-container *ngIf="filteredLogs.length > 0; else emptyState">
      <mat-table [dataSource]="filteredLogs" class="audit-table">
        <ng-container matColumnDef="timestamp">
          <mat-header-cell *matHeaderCellDef>Timestamp</mat-header-cell>
          <mat-cell *matCellDef="let log">{{ log.timestamp | date:'short' }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="user">
          <mat-header-cell *matHeaderCellDef>User</mat-header-cell>
          <mat-cell *matCellDef="let log">{{ log.user }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="action">
          <mat-header-cell *matHeaderCellDef>Action</mat-header-cell>
          <mat-cell *matCellDef="let log">{{ log.action }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="entity">
          <mat-header-cell *matHeaderCellDef>Entity</mat-header-cell>
          <mat-cell *matCellDef="let log">{{ log.entity }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="details">
          <mat-header-cell *matHeaderCellDef>Details</mat-header-cell>
          <mat-cell *matCellDef="let log">{{ log.details }}</mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
      </mat-table>
      <mat-paginator [pageSizeOptions]="[25, 50, 100]" showFirstLastButtons></mat-paginator>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>history</mat-icon>
        <p>No audit log entries found.</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
