<mat-card class="incident-reports-card">
  <mat-card-header>
    <mat-card-title>Incident Reports</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="toolbar">
      <button mat-raised-button color="primary" (click)="toggleForm()">
        <mat-icon>{{ showForm ? 'close' : 'add' }}</mat-icon>
        {{ showForm ? 'Cancel' : 'Report New Incident' }}
      </button>
    </div>

    <mat-expansion-panel *ngIf="showForm" [expanded]="showForm" class="incident-form-panel">
      <mat-expansion-panel-header>
        <mat-panel-title>New Incident Report</mat-panel-title>
      </mat-expansion-panel-header>
      <form [formGroup]="incidentForm" (ngSubmit)="onSubmit()" class="incident-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Incident Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="incidentDate">
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Location</mat-label>
          <input matInput formControlName="location">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Severity</mat-label>
          <mat-select formControlName="severity">
            <mat-option *ngFor="let s of severityOptions" [value]="s">{{ s }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="4"></textarea>
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="incidentForm.invalid">
            <mat-icon>send</mat-icon> Submit Report
          </button>
        </div>
      </form>
    </mat-expansion-panel>

    <ng-container *ngIf="incidents.length > 0; else noIncidents">
      <mat-table [dataSource]="incidents" class="incidents-table">
        <ng-container matColumnDef="incidentDate">
          <mat-header-cell *matHeaderCellDef>Date</mat-header-cell>
          <mat-cell *matCellDef="let inc">{{ inc.incidentDate | date:'shortDate' }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="location">
          <mat-header-cell *matHeaderCellDef>Location</mat-header-cell>
          <mat-cell *matCellDef="let inc">{{ inc.location }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="severity">
          <mat-header-cell *matHeaderCellDef>Severity</mat-header-cell>
          <mat-cell *matCellDef="let inc">
            <mat-chip [ngClass]="'severity-' + inc.severity.toLowerCase()">{{ inc.severity }}</mat-chip>
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="description">
          <mat-header-cell *matHeaderCellDef>Description</mat-header-cell>
          <mat-cell *matCellDef="let inc">{{ inc.description }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="actions">
          <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
          <mat-cell *matCellDef="let inc">
            <button mat-icon-button color="primary"><mat-icon>visibility</mat-icon></button>
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
      </mat-table>
    </ng-container>

    <ng-template #noIncidents>
      <div class="empty-state">
        <mat-icon>report</mat-icon>
        <p>No incident reports filed.</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
