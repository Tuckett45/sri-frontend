<mat-sidenav-container class="payroll-sidenav-container">
  <mat-sidenav mode="side" opened class="payroll-sidenav">
    <mat-nav-list>
      <a mat-list-item
         *ngFor="let link of navLinks"
         [routerLink]="link.route"
         routerLinkActive="active-link">
        {{ link.label }}
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="payroll-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
