<h2 mat-dialog-title>Adjust Budget</h2>
<mat-dialog-content>
  <form [formGroup]="adjustmentForm" class="adjustment-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
      </mat-select>
      <mat-error *ngIf="adjustmentForm.get('category')?.hasError('required')">Category is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Adjustment Amount</mat-label>
      <input matInput type="number" formControlName="amount">
      <span matPrefix>$&nbsp;</span>
      <mat-hint>Use negative value to decrease budget</mat-hint>
      <mat-error *ngIf="adjustmentForm.get('amount')?.hasError('required')">Amount is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Reason for Adjustment</mat-label>
      <textarea matInput formControlName="reason" rows="3"></textarea>
      <mat-error *ngIf="adjustmentForm.get('reason')?.hasError('required')">Reason is required</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="adjustmentForm.invalid">
    <mat-icon>save</mat-icon> Save Adjustment
  </button>
</mat-dialog-actions>
