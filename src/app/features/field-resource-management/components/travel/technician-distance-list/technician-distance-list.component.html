<mat-card class="distance-list-card">
  <mat-card-header>
    <mat-card-title>Job Distances</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <ng-container *ngIf="distances.length > 0; else emptyState">
      <mat-table [dataSource]="distances" class="distance-table">
        <ng-container matColumnDef="jobTitle">
          <mat-header-cell *matHeaderCellDef>Job</mat-header-cell>
          <mat-cell *matCellDef="let d">{{ d.jobTitle }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="distance">
          <mat-header-cell *matHeaderCellDef>Distance (mi)</mat-header-cell>
          <mat-cell *matCellDef="let d">
            <span [ngClass]="getDistanceClass(d.distance)" class="distance-badge">
              {{ d.distance }} mi
            </span>
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="travelTime">
          <mat-header-cell *matHeaderCellDef>Est. Drive Time</mat-header-cell>
          <mat-cell *matCellDef="let d">{{ d.travelTime }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="status">
          <mat-header-cell *matHeaderCellDef>Range</mat-header-cell>
          <mat-cell *matCellDef="let d">
            <span *ngIf="d.distance < 50" class="distance-green">Local</span>
            <span *ngIf="d.distance >= 50 && d.distance <= 150" class="distance-yellow">Regional</span>
            <span *ngIf="d.distance > 150" class="distance-red">Long Distance</span>
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
      </mat-table>

      <div class="legend">
        <span class="distance-green">&#9632; &lt;50mi (Local)</span>
        <span class="distance-yellow">&#9632; 50-150mi (Regional)</span>
        <span class="distance-red">&#9632; &gt;150mi (Long Distance)</span>
      </div>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>map</mat-icon>
        <p>No job distances available.</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
