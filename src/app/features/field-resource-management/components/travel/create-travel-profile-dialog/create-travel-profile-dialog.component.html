<h2 mat-dialog-title>Create Travel Profile</h2>
<mat-dialog-content>
  <form [formGroup]="travelProfileForm" class="travel-profile-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Home Airport (e.g. ATL, ORD)</mat-label>
      <input matInput formControlName="homeAirport" placeholder="3-letter code">
      <mat-icon matSuffix>flight</mat-icon>
      <mat-error *ngIf="travelProfileForm.get('homeAirport')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Preferred Hotel Chain</mat-label>
      <mat-select formControlName="preferredHotelChain">
        <mat-option *ngFor="let h of hotelChains" [value]="h">{{ h }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Vehicle Type</mat-label>
      <mat-select formControlName="vehicleType">
        <mat-option *ngFor="let v of vehicleTypes" [value]="v">{{ v }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>License Plate</mat-label>
      <input matInput formControlName="licensePlate">
      <mat-icon matSuffix>directions_car</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Max Drive Distance (miles)</mat-label>
      <input matInput type="number" formControlName="maxDriveDistance" min="0">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="travelProfileForm.invalid">
    <mat-icon>save</mat-icon> Save Profile
  </button>
</mat-dialog-actions>
