<div class="credential-form-page">
  <div class="page-header">
    <button mat-icon-button (click)="cancel()"><mat-icon>arrow_back</mat-icon></button>
    <h2>{{isEdit ? 'Edit' : 'Add'}} Credential</h2>
  </div>
  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" class="form-grid">
        <mat-form-field appearance="outline" class="full-span">
          <mat-label>Credential Name *</mat-label>
          <input matInput formControlName="credentialName">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Issuing Organization *</mat-label>
          <input matInput formControlName="issuingOrganization">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Credential Number</mat-label>
          <input matInput formControlName="credentialNumber">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Issue Date *</mat-label>
          <input matInput type="date" formControlName="issueDate">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Expiration Date</mat-label>
          <input matInput type="date" formControlName="expirationDate">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-span">
          <mat-label>Notes</mat-label>
          <textarea matInput formControlName="notes" rows="3"></textarea>
        </mat-form-field>
        <div class="file-upload full-span">
          <label>Credential Document</label>
          <input type="file" (change)="onFileChange($event)" accept=".pdf,.jpg,.png">
          <span *ngIf="selectedFile" class="file-name">{{selectedFile.name}}</span>
        </div>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save</button>
    </mat-card-actions>
  </mat-card>
</div>
