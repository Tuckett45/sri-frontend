<div class="credentials-list">
  <div class="list-header">
    <h2>Credentials &amp; Certifications</h2>
    <button mat-raised-button color="primary" (click)="addCredential()">
      <mat-icon>add</mat-icon> Add Credential
    </button>
  </div>
  <mat-card>
    <mat-table [dataSource]="credentials">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Credential</mat-header-cell>
        <mat-cell *matCellDef="let c"><strong>{{c.name}}</strong></mat-cell>
      </ng-container>
      <ng-container matColumnDef="issuer">
        <mat-header-cell *matHeaderCellDef>Issuer</mat-header-cell>
        <mat-cell *matCellDef="let c">{{c.issuer}}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="issueDate">
        <mat-header-cell *matHeaderCellDef>Issued</mat-header-cell>
        <mat-cell *matCellDef="let c">{{c.issueDate | date:'shortDate'}}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="expirationDate">
        <mat-header-cell *matHeaderCellDef>Expires</mat-header-cell>
        <mat-cell *matCellDef="let c">{{c.expirationDate | date:'shortDate'}}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
        <mat-cell *matCellDef="let c"><mat-chip [color]="getStatusColor(c.status)" highlighted>{{c.status}}</mat-chip></mat-cell>
      </ng-container>
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef></mat-header-cell>
        <mat-cell *matCellDef="let c">
          <button mat-icon-button (click)="viewCredential(c.id)" matTooltip="View"><mat-icon>visibility</mat-icon></button>
        </mat-cell>
      </ng-container>
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>
  </mat-card>
</div>
