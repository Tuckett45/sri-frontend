<h2 mat-dialog-title>Create Purchase Order</h2>
<mat-dialog-content>
  <form [formGroup]="poForm" class="po-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Supplier</mat-label>
      <mat-select formControlName="supplier">
        <mat-option *ngFor="let s of suppliers" [value]="s">{{ s }}</mat-option>
      </mat-select>
      <mat-error *ngIf="poForm.get('supplier')?.hasError('required')">Supplier is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Delivery Date</mat-label>
      <input matInput [matDatepicker]="deliveryPicker" formControlName="deliveryDate">
      <mat-datepicker-toggle matSuffix [for]="deliveryPicker"></mat-datepicker-toggle>
      <mat-datepicker #deliveryPicker></mat-datepicker>
      <mat-error *ngIf="poForm.get('deliveryDate')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <div class="items-section">
      <div class="items-header">
        <h3>Items</h3>
        <button mat-stroked-button type="button" (click)="addItem()">
          <mat-icon>add</mat-icon> Add Item
        </button>
      </div>

      <div formArrayName="items">
        <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row">
          <mat-form-field appearance="outline" class="item-name">
            <mat-label>Item Name</mat-label>
            <input matInput formControlName="name">
          </mat-form-field>
          <mat-form-field appearance="outline" class="item-qty">
            <mat-label>Qty</mat-label>
            <input matInput type="number" formControlName="quantity" min="1">
          </mat-form-field>
          <mat-form-field appearance="outline" class="item-cost">
            <mat-label>Unit Cost</mat-label>
            <input matInput type="number" formControlName="unitCost" min="0">
            <span matPrefix>$&nbsp;</span>
          </mat-form-field>
          <button mat-icon-button color="warn" type="button" (click)="removeItem(i)" [disabled]="items.length === 1">
            <mat-icon>remove_circle</mat-icon>
          </button>
        </div>
      </div>

      <div class="total-row">
        <strong>Total: {{ totalCost | currency }}</strong>
      </div>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="poForm.invalid">
    <mat-icon>send</mat-icon> Submit PO
  </button>
</mat-dialog-actions>
