<mat-card class="materials-card">
  <mat-card-header>
    <mat-card-title>Materials</mat-card-title>
    <div class="header-actions">
      <button mat-stroked-button (click)="createPO()">
        <mat-icon>receipt</mat-icon> Create PO
      </button>
      <button mat-raised-button color="primary" (click)="addMaterial()">
        <mat-icon>add</mat-icon> Add Material
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <div class="filter-bar">
      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select [(ngModel)]="selectedCategory">
          <mat-option value="">All Categories</mat-option>
          <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Supplier</mat-label>
        <mat-select [(ngModel)]="selectedSupplier">
          <mat-option value="">All Suppliers</mat-option>
          <mat-option *ngFor="let sup of suppliers" [value]="sup">{{ sup }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <ng-container *ngIf="filteredMaterials.length > 0; else emptyState">
      <mat-table [dataSource]="filteredMaterials" class="materials-table">
        <ng-container matColumnDef="name">
          <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
          <mat-cell *matCellDef="let m">{{ m.name }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="category">
          <mat-header-cell *matHeaderCellDef>Category</mat-header-cell>
          <mat-cell *matCellDef="let m">{{ m.category }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="quantity">
          <mat-header-cell *matHeaderCellDef>Quantity</mat-header-cell>
          <mat-cell *matCellDef="let m">{{ m.quantity }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="unit">
          <mat-header-cell *matHeaderCellDef>Unit</mat-header-cell>
          <mat-cell *matCellDef="let m">{{ m.unit }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="cost">
          <mat-header-cell *matHeaderCellDef>Cost</mat-header-cell>
          <mat-cell *matCellDef="let m">{{ m.cost | currency }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="supplier">
          <mat-header-cell *matHeaderCellDef>Supplier</mat-header-cell>
          <mat-cell *matCellDef="let m">{{ m.supplier }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="actions">
          <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
          <mat-cell *matCellDef="let m">
            <button mat-icon-button color="primary" (click)="editMaterial(m)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="deleteMaterial(m)"><mat-icon>delete</mat-icon></button>
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
      </mat-table>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>category</mat-icon>
        <p>No materials found.</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
