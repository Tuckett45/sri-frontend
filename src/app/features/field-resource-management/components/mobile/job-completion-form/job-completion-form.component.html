<mat-card class="completion-form">
  <mat-card-header>
    <mat-card-title>Complete Job{{ jobId ? ': ' + jobId : '' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Completion Notes</mat-label>
        <textarea matInput formControlName="completionNotes" rows="4" placeholder="Describe work performed..."></textarea>
        <mat-error *ngIf="form.get('completionNotes')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Issues Found</mat-label>
        <textarea matInput formControlName="issuesFound" rows="2" placeholder="Any issues or follow-up needed..."></textarea>
      </mat-form-field>

      <div class="photo-upload">
        <label>Photos</label>
        <input type="file" multiple accept="image/*" (change)="onFileSelected($event)" #fileInput style="display:none">
        <button type="button" mat-stroked-button (click)="fileInput.click()">
          <mat-icon>photo_camera</mat-icon> Add Photos
        </button>
        <span *ngIf="selectedFiles.length" class="file-count">{{ selectedFiles.length }} file(s) selected</span>
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid" class="submit-btn">
        <mat-icon>check_circle</mat-icon> Mark Complete
      </button>
    </form>
  </mat-card-content>
</mat-card>
