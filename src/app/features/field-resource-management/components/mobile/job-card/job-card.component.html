<mat-card class="job-card" *ngIf="job">
  <mat-card-header>
    <mat-card-title>{{ job.id }}</mat-card-title>
    <mat-card-subtitle>{{ job.customer }}</mat-card-subtitle>
    <mat-chip-set style="margin-left: auto;">
      <mat-chip [highlighted]="true" [color]="getStatusColor(job.status)">{{ job.status }}</mat-chip>
    </mat-chip-set>
  </mat-card-header>

  <mat-card-content>
    <div class="location">
      <mat-icon>location_on</mat-icon>
      <span>{{ job.location }}</span>
    </div>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button color="primary" (click)="viewDetails.emit()">View Details</button>
    <button mat-button color="accent" (click)="toggleTracker()">
      <mat-icon>timer</mat-icon> Time
    </button>
  </mat-card-actions>

  <mat-card-content *ngIf="showTracker">
    <app-time-tracker [jobId]="job.id" (clockIn)="clockIn.emit()"></app-time-tracker>
  </mat-card-content>
</mat-card>
