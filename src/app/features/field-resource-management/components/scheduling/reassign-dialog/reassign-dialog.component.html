<h2 mat-dialog-title>Reassign Job</h2>
<mat-dialog-content>
  <div class="assignment-info" *ngIf="data?.assignment">
    <p><strong>Job:</strong> {{ data.assignment.jobName }}</p>
  </div>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Search Technician</mat-label>
    <input matInput [(ngModel)]="searchTerm" (ngModelChange)="filterTechnicians()" placeholder="Type to search...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <form [formGroup]="form" class="dialog-form">
    <mat-selection-list formControlName="newTechnicianId" [multiple]="false">
      <mat-list-option *ngFor="let tech of filteredTechnicians" [value]="tech.id">
        <mat-icon mat-list-icon>person</mat-icon>
        <span mat-line>{{ tech.name }}</span>
        <span mat-line class="tech-meta">{{ tech.market }} &bull; {{ tech.availability }}</span>
      </mat-list-option>
      <mat-list-option *ngIf="filteredTechnicians.length === 0" disabled>
        No technicians found
      </mat-list-option>
    </mat-selection-list>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes (optional)</mat-label>
      <textarea matInput formControlName="notes" rows="2"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">Reassign</button>
</mat-dialog-actions>
