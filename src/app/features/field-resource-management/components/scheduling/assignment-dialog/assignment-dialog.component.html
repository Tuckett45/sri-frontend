<h2 mat-dialog-title>Create Assignment</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Technician</mat-label>
      <mat-select formControlName="technicianId">
        <mat-option *ngFor="let tech of technicians" [value]="tech.id">{{ tech.name }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('technicianId')?.hasError('required')">Technician is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Job</mat-label>
      <mat-select formControlName="jobId">
        <mat-option *ngFor="let job of jobs" [value]="job.id">{{ job.name }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('jobId')?.hasError('required')">Job is required</mat-error>
    </mat-form-field>

    <div class="date-row">
      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" formControlName="startDate">
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" formControlName="endDate">
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="time-row">
      <mat-form-field appearance="outline">
        <mat-label>Start Time</mat-label>
        <input matInput type="time" formControlName="startTime">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Time</mat-label>
        <input matInput type="time" formControlName="endTime">
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">Create</button>
</mat-dialog-actions>
