<div class="calendar-view">
  <div class="calendar-header">
    <div class="nav-controls">
      <button mat-icon-button (click)="previousPeriod()">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <span class="current-period">{{ currentDate | date:'MMMM yyyy' }}</span>
      <button mat-icon-button (click)="nextPeriod()">
        <mat-icon>chevron_right</mat-icon>
      </button>
      <button mat-stroked-button (click)="today()">Today</button>
    </div>
    <mat-button-toggle-group [(ngModel)]="viewMode" class="view-toggle">
      <mat-button-toggle value="day">Day</mat-button-toggle>
      <mat-button-toggle value="week">Week</mat-button-toggle>
      <mat-button-toggle value="month">Month</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <div class="calendar-grid">
    <table mat-table class="full-width">
      <ng-container matColumnDef="technician">
        <th mat-header-cell *matHeaderCellDef>Technician</th>
        <td mat-cell *matCellDef="let tech">{{ tech.name }}</td>
      </ng-container>

      <ng-container *ngFor="let day of weekDays; let i = index" [matColumnDef]="'day' + i">
        <th mat-header-cell *matHeaderCellDef>{{ day | date:'EEE M/d' }}</th>
        <td mat-cell *matCellDef="let tech">
          <div class="assignment-block" *ngFor="let a of getAssignmentsForCell(tech.id, day)">
            {{ a.jobName }}
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['technician', 'day0','day1','day2','day3','day4','day5','day6']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['technician', 'day0','day1','day2','day3','day4','day5','day6'];"></tr>
    </table>

    <div class="empty-state" *ngIf="technicians.length === 0">
      <mat-icon>calendar_today</mat-icon>
      <p>No technicians to display.</p>
    </div>
  </div>

  <button mat-fab color="primary" class="fab-add" (click)="openAssignDialog()">
    <mat-icon>add</mat-icon>
  </button>
</div>
