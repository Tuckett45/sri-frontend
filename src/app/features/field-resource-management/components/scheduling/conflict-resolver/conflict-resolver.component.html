<div class="conflict-resolver">
  <div class="resolver-header">
    <h2>Scheduling Conflicts</h2>
    <div class="header-actions">
      <mat-chip-listbox>
        <mat-chip color="warn" selected>{{ unresolvedCount }} Unresolved</mat-chip>
      </mat-chip-listbox>
      <button mat-stroked-button color="primary" (click)="autoResolveAll()" [disabled]="unresolvedCount === 0">
        <mat-icon>auto_fix_high</mat-icon> Auto-Resolve All
      </button>
    </div>
  </div>

  <div class="conflicts-list" *ngIf="conflicts.length > 0; else noConflicts">
    <mat-card class="conflict-card" *ngFor="let conflict of conflicts" [class.resolved]="conflict.resolved">
      <mat-card-header>
        <mat-icon mat-card-avatar [color]="conflict.resolved ? 'primary' : 'warn'">
          {{ conflict.resolved ? 'check_circle' : 'warning' }}
        </mat-icon>
        <mat-card-title>{{ conflict.description }}</mat-card-title>
        <mat-card-subtitle>
          <span *ngIf="conflict.resolved" class="resolved-label">Resolved</span>
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="affected-items">
          <div *ngIf="conflict.affectedTechnicians.length > 0">
            <strong>Technicians:</strong> {{ conflict.affectedTechnicians.join(', ') }}
          </div>
          <div *ngIf="conflict.affectedJobs.length > 0">
            <strong>Jobs:</strong> {{ conflict.affectedJobs.join(', ') }}
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions *ngIf="!conflict.resolved">
        <button mat-button color="accent" (click)="autoResolve(conflict)">
          <mat-icon>auto_fix_high</mat-icon> Auto-Resolve
        </button>
        <button mat-button *ngFor="let opt of conflict.resolutionOptions" (click)="manualResolve(conflict, opt)">
          {{ opt.label }}
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <ng-template #noConflicts>
    <div class="empty-state">
      <mat-icon color="primary">check_circle</mat-icon>
      <p>No scheduling conflicts detected.</p>
    </div>
  </ng-template>
</div>
