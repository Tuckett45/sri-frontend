<mat-card class="inventory-card">
  <mat-card-header>
    <mat-card-title>Inventory</mat-card-title>
    <div class="header-actions">
      <button mat-raised-button color="primary" (click)="addItem()">
        <mat-icon>add</mat-icon> Add Item
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <div class="filter-bar">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search inventory</mat-label>
        <input matInput [(ngModel)]="searchQuery" placeholder="Name or SKU...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select [(ngModel)]="selectedCategory">
          <mat-option value="">All Categories</mat-option>
          <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <ng-container *ngIf="filteredItems.length > 0; else emptyState">
      <mat-table [dataSource]="filteredItems" class="inventory-table">
        <ng-container matColumnDef="name">
          <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
          <mat-cell *matCellDef="let item">{{ item.name }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="sku">
          <mat-header-cell *matHeaderCellDef>SKU</mat-header-cell>
          <mat-cell *matCellDef="let item">{{ item.sku }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="quantity">
          <mat-header-cell *matHeaderCellDef>Qty</mat-header-cell>
          <mat-cell *matCellDef="let item">{{ item.quantity }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="location">
          <mat-header-cell *matHeaderCellDef>Location</mat-header-cell>
          <mat-cell *matCellDef="let item">{{ item.location }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="assignedTo">
          <mat-header-cell *matHeaderCellDef>Assigned To</mat-header-cell>
          <mat-cell *matCellDef="let item">{{ item.assignedTo || '-' }}</mat-cell>
        </ng-container>
        <ng-container matColumnDef="actions">
          <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
          <mat-cell *matCellDef="let item">
            <button mat-stroked-button color="primary" (click)="assignItem(item)">
              <mat-icon>assignment_ind</mat-icon> Assign
            </button>
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
      </mat-table>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>No inventory items found.</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
