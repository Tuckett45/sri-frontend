<h2 mat-dialog-title>Assign Inventory</h2>
<mat-dialog-content>
  <p *ngIf="data?.item" class="item-info">
    Assigning: <strong>{{ data.item.name }}</strong> (SKU: {{ data.item.sku }})
  </p>
  <form [formGroup]="assignmentForm" class="assignment-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Technician</mat-label>
      <mat-select formControlName="technicianId">
        <mat-option *ngFor="let tech of technicians" [value]="tech.id">{{ tech.name }}</mat-option>
        <mat-option *ngIf="technicians.length === 0" disabled>No technicians available</mat-option>
      </mat-select>
      <mat-error *ngIf="assignmentForm.get('technicianId')?.hasError('required')">Technician is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Job (optional)</mat-label>
      <mat-select formControlName="jobId">
        <mat-option value="">None</mat-option>
        <mat-option *ngFor="let job of jobs" [value]="job.id">{{ job.title }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" min="1">
      <mat-error *ngIf="assignmentForm.get('quantity')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="assignmentForm.get('quantity')?.hasError('min')">Must be at least 1</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onConfirm()" [disabled]="assignmentForm.invalid">
    <mat-icon>assignment_ind</mat-icon> Confirm Assignment
  </button>
</mat-dialog-actions>
