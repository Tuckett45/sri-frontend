<nav class="breadcrumb-container" aria-label="Breadcrumb navigation">
  <ol class="breadcrumb-list">
    <li 
      *ngFor="let breadcrumb of breadcrumbs; let last = last"
      class="breadcrumb-item"
      [class.breadcrumb-item--current]="last"
    >
      <!-- Clickable breadcrumb (not current page) -->
      <a 
        *ngIf="!last"
        class="breadcrumb-link"
        [routerLink]="breadcrumb.url"
        [attr.aria-label]="'Navigate to ' + breadcrumb.label"
        (click)="navigateTo(breadcrumb)"
      >
        <mat-icon *ngIf="breadcrumb.icon" class="breadcrumb-icon">
          {{ breadcrumb.icon }}
        </mat-icon>
        <span class="breadcrumb-label">{{ breadcrumb.label }}</span>
      </a>

      <!-- Current page (non-clickable) -->
      <span 
        *ngIf="last"
        class="breadcrumb-current"
        aria-current="page"
      >
        <mat-icon *ngIf="breadcrumb.icon" class="breadcrumb-icon">
          {{ breadcrumb.icon }}
        </mat-icon>
        <span class="breadcrumb-label">{{ breadcrumb.label }}</span>
      </span>

      <!-- Separator -->
      <mat-icon 
        *ngIf="!last"
        class="breadcrumb-separator"
        aria-hidden="true"
      >
        chevron_right
      </mat-icon>
    </li>
  </ol>
</nav>
