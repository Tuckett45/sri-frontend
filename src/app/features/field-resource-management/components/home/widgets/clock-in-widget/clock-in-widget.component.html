<mat-card class="clock-in-widget">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>schedule</mat-icon>
      Time Clock
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="clock-display">
      <div class="current-time">{{ currentTime | date:'HH:mm:ss' }}</div>
      <div class="current-date">{{ currentTime | date:'EEEE, MMMM d, y' }}</div>
    </div>
    <div class="clock-status" *ngIf="isClockedIn">
      <mat-chip class="clocked-in-chip">Clocked In</mat-chip>
      <div class="clock-in-since">Since {{ clockInTime | date:'HH:mm' }}</div>
      <div class="elapsed-time">Elapsed: {{ elapsedTime }}</div>
    </div>
    <div class="clock-actions">
      <button
        mat-raised-button
        [color]="isClockedIn ? 'warn' : 'primary'"
        (click)="isClockedIn ? clockOut() : clockIn()"
        class="clock-button"
      >
        <mat-icon>{{ isClockedIn ? 'stop' : 'play_arrow' }}</mat-icon>
        {{ isClockedIn ? 'Clock Out' : 'Clock In' }}
      </button>
    </div>
  </mat-card-content>
</mat-card>
