<mat-card class="expenses-widget">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>receipt</mat-icon>
      Expenses
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="expense-row">
      <div class="expense-item">
        <div class="expense-label">Total Expenses</div>
        <div class="expense-value total">${{ totalExpenses | number:'1.2-2' }}</div>
      </div>
      <mat-divider vertical></mat-divider>
      <div class="expense-item">
        <div class="expense-label">Pending</div>
        <div class="expense-value pending">${{ pendingExpenses | number:'1.2-2' }}</div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
