<mat-card class="travel-break-pto-widget">
  <mat-card-header>
    <mat-card-title>Travel / Break / PTO</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="status-row">
      <div class="status-item">
        <mat-icon>directions_car</mat-icon>
        <div class="status-label">Travel</div>
        <mat-chip [ngClass]="travelStatus === 'None' ? 'status-none' : 'status-active'">{{ travelStatus }}</mat-chip>
      </div>
      <div class="status-item">
        <mat-icon>free_breakfast</mat-icon>
        <div class="status-label">Break</div>
        <mat-chip [ngClass]="breakStatus === 'None' ? 'status-none' : 'status-active'">{{ breakStatus }}</mat-chip>
      </div>
      <div class="status-item">
        <mat-icon>beach_access</mat-icon>
        <div class="status-label">PTO Balance</div>
        <mat-chip class="pto-chip">{{ ptoBalance }}h</mat-chip>
      </div>
    </div>
  </mat-card-content>
</mat-card>
