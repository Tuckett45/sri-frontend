<mat-card class="approvals-widget">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>approval</mat-icon>
      Pending Approvals
      <span class="pending-badge" *ngIf="pendingCount > 0">{{ pendingCount }}</span>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-list *ngIf="pendingItems.length; else noApprovals">
      <mat-list-item *ngFor="let item of pendingItems">
        <mat-icon matListItemIcon>pending</mat-icon>
        <span matListItemTitle>{{ item.title || item.description }}</span>
        <span matListItemLine>{{ item.type }} &mdash; {{ item.submittedAt | date:'short' }}</span>
      </mat-list-item>
    </mat-list>
    <ng-template #noApprovals>
      <p class="empty-state">No pending approvals.</p>
    </ng-template>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" (click)="viewAll()">View All</button>
  </mat-card-actions>
</mat-card>
