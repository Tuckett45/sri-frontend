<mat-card class="kpi-summary-card">
  <mat-card-header>
    <mat-card-title>KPI Summary</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="kpi-grid">
      <div class="kpi-item" *ngFor="let kpi of kpis">
        <div class="kpi-icon">
          <mat-icon>{{ kpi.icon }}</mat-icon>
        </div>
        <div class="kpi-value">{{ kpi.value }}</div>
        <div class="kpi-label">{{ kpi.label }}</div>
        <div class="kpi-trend" [ngClass]="getTrendClass(kpi.trend)">
          <mat-icon>{{ getTrendIcon(kpi.trend) }}</mat-icon>
        </div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
