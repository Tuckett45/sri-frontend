<mat-card class="active-jobs-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>work</mat-icon>
      Active Jobs
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <!-- Loading state -->
    <div *ngIf="loading$ | async" class="widget-loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <!-- Error state -->
    <div *ngIf="error" class="widget-error">
      <p>Unable to load data. Please try again.</p>
      <button mat-button color="primary" (click)="retry()">Retry</button>
    </div>

    <!-- Data state -->
    <ng-container *ngIf="!(loading$ | async) && !error">
      <div *ngIf="(activeJobs$ | async) as jobs" class="jobs-list">
        <div
          *ngFor="let job of jobs"
          class="job-item"
          (click)="onJobClick(job.id)"
          role="button"
          tabindex="0"
          (keydown.enter)="onJobClick(job.id)"
          [attr.aria-label]="'Job ' + job.jobId + ' - ' + job.client + ' - ' + getStatusLabel(job.status)"
        >
          <div class="job-info">
            <span class="job-id">{{ job.jobId }}</span>
            <span class="job-client">{{ job.client }}</span>
            <span class="job-site">{{ job.siteName }}</span>
          </div>
          <span class="status-badge" [ngClass]="getStatusClass(job.status)">
            {{ getStatusLabel(job.status) }}
          </span>
        </div>

        <div *ngIf="jobs.length === 0" class="empty-state">
          <mat-icon>check_circle_outline</mat-icon>
          <p>No active jobs</p>
        </div>
      </div>
    </ng-container>
  </mat-card-content>
</mat-card>
