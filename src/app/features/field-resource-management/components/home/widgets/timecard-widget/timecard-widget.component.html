<mat-card class="timecard-widget">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>access_time</mat-icon>
      Timecard Summary
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="stat-row">
      <div class="stat-label">Today</div>
      <div class="stat-value">{{ hoursToday }}h</div>
    </div>
    <mat-progress-bar mode="determinate" [value]="dayProgress" color="primary"></mat-progress-bar>
    <div class="stat-row" style="margin-top: 16px;">
      <div class="stat-label">This Week</div>
      <div class="stat-value">{{ hoursThisWeek }}h / {{ targetWeeklyHours }}h</div>
    </div>
    <mat-progress-bar mode="determinate" [value]="weekProgress" color="accent"></mat-progress-bar>
  </mat-card-content>
</mat-card>
