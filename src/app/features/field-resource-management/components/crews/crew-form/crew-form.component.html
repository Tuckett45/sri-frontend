<div class="crew-form">
  <div class="form-header">
    <button mat-icon-button (click)="cancel()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>{{ isEdit ? 'Edit Crew' : 'Create Crew' }}</h2>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" class="form-body">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Crew Name</mat-label>
          <input matInput formControlName="name" placeholder="Enter crew name">
          <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Lead Technician</mat-label>
          <mat-select formControlName="leadTechnicianId">
            <mat-option *ngFor="let tech of technicians" [value]="tech.id">{{ tech.name }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('leadTechnicianId')?.hasError('required')">Lead technician is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Members</mat-label>
          <mat-select formControlName="memberIds" multiple>
            <mat-option *ngFor="let tech of technicians" [value]="tech.id">{{ tech.name }}</mat-option>
          </mat-select>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid || loading">
        {{ isEdit ? 'Save Changes' : 'Create Crew' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
