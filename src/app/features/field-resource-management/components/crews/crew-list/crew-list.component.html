<div class="crew-list">
  <div class="list-header">
    <h2>Crews</h2>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search crews</mat-label>
      <input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <mat-card>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Crew Name</th>
        <td mat-cell *matCellDef="let crew">{{ crew.name }}</td>
      </ng-container>

      <ng-container matColumnDef="leadTechnician">
        <th mat-header-cell *matHeaderCellDef>Lead Technician</th>
        <td mat-cell *matCellDef="let crew">{{ crew.leadTechnicianName }}</td>
      </ng-container>

      <ng-container matColumnDef="memberCount">
        <th mat-header-cell *matHeaderCellDef>Members</th>
        <td mat-cell *matCellDef="let crew">{{ crew.memberCount }}</td>
      </ng-container>

      <ng-container matColumnDef="currentAssignment">
        <th mat-header-cell *matHeaderCellDef>Current Assignment</th>
        <td mat-cell *matCellDef="let crew">{{ crew.currentAssignment || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let crew">
          <mat-chip [color]="crew.status === 'active' ? 'primary' : 'warn'" selected>
            {{ crew.status | titlecase }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let crew">
          <button mat-icon-button (click)="viewCrew(crew.id)" matTooltip="View">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button (click)="editCrew(crew.id)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="empty-state" *ngIf="dataSource.data.length === 0">
      <mat-icon>group</mat-icon>
      <p>No crews found.</p>
    </div>
  </mat-card>

  <button mat-fab color="primary" class="fab-add" (click)="navigateToCreate()">
    <mat-icon>add</mat-icon>
  </button>
</div>
