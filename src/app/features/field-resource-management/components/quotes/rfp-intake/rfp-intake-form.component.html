<form [formGroup]="form" (ngSubmit)="submit()" class="rfp-form">
  <h3>RFP Intake Form</h3>

  <div class="form-section">
    <h4>Client Information</h4>
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Client Name *</mat-label>
        <input matInput formControlName="clientName">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Client Email *</mat-label>
        <input matInput formControlName="clientEmail" type="email">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Client Phone</mat-label>
        <input matInput formControlName="clientPhone">
      </mat-form-field>
    </div>
  </div>

  <div class="form-section">
    <h4>Project Details</h4>
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Project Title *</mat-label>
        <input matInput formControlName="projectTitle">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Project Type *</mat-label>
        <mat-select formControlName="projectType">
          <mat-option *ngFor="let t of projectTypes" [value]="t">{{t}}</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Urgency</mat-label>
        <mat-select formControlName="urgency">
          <mat-option *ngFor="let u of urgencyLevels" [value]="u">{{u}}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Scope Description *</mat-label>
      <textarea matInput formControlName="scopeDescription" rows="4" placeholder="Describe the project scope, requirements, and deliverables..."></textarea>
    </mat-form-field>
  </div>

  <div class="form-section">
    <h4>Site Information</h4>
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Site Address</mat-label>
        <input matInput formControlName="siteAddress">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input matInput formControlName="siteCity">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>State</mat-label>
        <input matInput formControlName="siteState">
      </mat-form-field>
    </div>
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Estimated Start Date</mat-label>
        <input matInput type="date" formControlName="estimatedStartDate">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Estimated Budget ($)</mat-label>
        <input matInput type="number" formControlName="estimatedBudget">
        <span matPrefix>$&nbsp;</span>
      </mat-form-field>
    </div>
  </div>

  <div class="form-actions">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Submit RFP</button>
  </div>
</form>
