<mat-card class="assembly-card">
  <mat-card-header>
    <mat-card-title>Quote Assembly</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table class="summary-table" aria-label="Quote assembly summary">
      <thead><tr><th>Section</th><th class="num">Value</th></tr></thead>
      <tbody>
        <tr *ngFor="let s of sections">
          <td>{{s.name}}</td>
          <td class="num">{{s.value | currency}}</td>
        </tr>
      </tbody>
      <tfoot>
        <tr class="subtotal-row"><td>Subtotal</td><td class="num">{{subtotal | currency}}</td></tr>
        <tr>
          <td>
            Markup
            <mat-slider min="0" max="50" step="1">
              <input matSliderThumb [(ngModel)]="markupPercent">
            </mat-slider>
            {{markupPercent}}%
          </td>
          <td class="num">{{markupAmount | currency}}</td>
        </tr>
        <tr class="total-row"><td><strong>Total Quote Value</strong></td><td class="num"><strong>{{totalValue | currency}}</strong></td></tr>
      </tfoot>
    </table>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-stroked-button (click)="generatePdf()">
      <mat-icon>picture_as_pdf</mat-icon> Generate PDF
    </button>
  </mat-card-actions>
</mat-card>
