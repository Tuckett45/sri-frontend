<div class="quote-workflow">
  <div class="workflow-header">
    <button mat-icon-button (click)="goBack()"><mat-icon>arrow_back</mat-icon></button>
    <h2>{{quote?.projectTitle}} &mdash; Quote Workflow</h2>
  </div>
  <mat-stepper [selectedIndex]="activeStep" orientation="horizontal">
    <mat-step label="RFP Intake"><app-rfp-intake-form></app-rfp-intake-form></mat-step>
    <mat-step label="Labor Estimate"><app-job-summary-form></app-job-summary-form></mat-step>
    <mat-step label="BOM"><app-bom-builder></app-bom-builder></mat-step>
    <mat-step label="BOM Review"><app-bom-validation></app-bom-validation></mat-step>
    <mat-step label="Assembly"><app-quote-assembly></app-quote-assembly></mat-step>
    <mat-step label="Delivery"><app-quote-delivery></app-quote-delivery></mat-step>
    <mat-step label="Convert"><app-convert-to-job></app-convert-to-job></mat-step>
  </mat-stepper>
</div>
