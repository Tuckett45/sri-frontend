<mat-card class="delivery-card">
  <mat-card-header>
    <mat-card-title>Quote Delivery</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div *ngIf="sent" class="sent-confirmation">
      <mat-icon color="primary">check_circle</mat-icon>
      <span>Quote sent successfully!</span>
    </div>
    <form *ngIf="!sent" [formGroup]="form" class="delivery-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Recipient Email *</mat-label>
        <input matInput formControlName="recipientEmail" type="email">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Subject *</mat-label>
        <input matInput formControlName="subject">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Message *</mat-label>
        <textarea matInput formControlName="message" rows="5"></textarea>
      </mat-form-field>
      <mat-checkbox formControlName="sendCopy">Send me a copy</mat-checkbox>
    </form>
  </mat-card-content>
  <mat-card-actions align="end" *ngIf="!sent">
    <button mat-raised-button color="primary" (click)="sendQuote()" [disabled]="form.invalid">
      <mat-icon>send</mat-icon> Send Quote
    </button>
  </mat-card-actions>
</mat-card>
