<mat-card class="job-summary-card">
  <mat-card-header>
    <mat-card-title>Labor Estimate</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" class="estimate-form">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Estimated Hours</mat-label>
          <input matInput type="number" formControlName="estimatedHours">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Labor Rate ($/hr)</mat-label>
          <input matInput type="number" formControlName="laborRate">
          <span matPrefix>$&nbsp;</span>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Number of Technicians</mat-label>
          <input matInput type="number" formControlName="numTechnicians">
        </mat-form-field>
      </div>
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Duration (days)</mat-label>
          <input matInput type="number" formControlName="durationDays">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Travel Estimate ($)</mat-label>
          <input matInput type="number" formControlName="travelEstimate">
          <span matPrefix>$&nbsp;</span>
        </mat-form-field>
      </div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Notes</mat-label>
        <textarea matInput formControlName="notes" rows="3"></textarea>
      </mat-form-field>
      <div class="total-row">
        <span class="total-label">Total Labor Cost:</span>
        <span class="total-value">{{totalLaborCost | currency}}</span>
      </div>
    </form>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save Estimate</button>
  </mat-card-actions>
</mat-card>
