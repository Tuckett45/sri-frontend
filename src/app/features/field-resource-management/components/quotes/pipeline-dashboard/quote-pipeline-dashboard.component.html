<mat-card [class.compact]="compact" class="pipeline-dashboard">
  <mat-card-header>
    <mat-card-title>Quote Pipeline</mat-card-title>
    <button mat-button color="primary" (click)="viewAll()" class="view-all-btn">View All</button>
  </mat-card-header>
  <mat-card-content>
    <div class="pipeline-stages" [class.compact-stages]="compact">
      <div *ngFor="let stage of stages" class="stage-card">
        <div class="stage-header" [style.border-color]="stage.color">
          <span class="stage-name">{{stage.name}}</span>
          <mat-chip [style.background-color]="stage.color" class="count-chip">{{stage.count}}</mat-chip>
        </div>
        <div *ngIf="!compact" class="stage-bar">
          <div class="bar-fill" [style.width.%]="(stage.count / totalQuotes) * 100" [style.background-color]="stage.color"></div>
        </div>
      </div>
    </div>
    <div class="total-row">
      <span>Total Active Quotes:</span>
      <strong>{{totalQuotes}}</strong>
    </div>
  </mat-card-content>
</mat-card>
