<div class="quote-list">
  <div class="list-header">
    <h2>Quotes &amp; RFPs</h2>
    <div class="actions">
      <mat-form-field appearance="outline" class="search">
        <mat-label>Search quotes</mat-label>
        <input matInput [(ngModel)]="searchTerm" (input)="applyFilter()">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="newQuote()">
        <mat-icon>add</mat-icon> New Quote
      </button>
    </div>
  </div>
  <mat-card>
    <mat-table [dataSource]="filteredQuotes">
      <ng-container matColumnDef="clientName">
        <mat-header-cell *matHeaderCellDef>Client</mat-header-cell>
        <mat-cell *matCellDef="let q"><strong>{{q.clientName}}</strong></mat-cell>
      </ng-container>
      <ng-container matColumnDef="projectTitle">
        <mat-header-cell *matHeaderCellDef>Project</mat-header-cell>
        <mat-cell *matCellDef="let q">{{q.projectTitle}}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
        <mat-cell *matCellDef="let q"><mat-chip [color]="getStatusColor(q.status)" highlighted>{{q.status}}</mat-chip></mat-cell>
      </ng-container>
      <ng-container matColumnDef="value">
        <mat-header-cell *matHeaderCellDef>Value</mat-header-cell>
        <mat-cell *matCellDef="let q">{{q.value | currency}}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="createdDate">
        <mat-header-cell *matHeaderCellDef>Created</mat-header-cell>
        <mat-cell *matCellDef="let q">{{q.createdDate | date:'shortDate'}}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let q">
          <button mat-icon-button (click)="viewQuote(q.id)" matTooltip="View"><mat-icon>visibility</mat-icon></button>
        </mat-cell>
      </ng-container>
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;" (click)="viewQuote(row.id)" style="cursor:pointer"></mat-row>
    </mat-table>
  </mat-card>
</div>
