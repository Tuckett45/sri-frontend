<div class="date-range-picker">
  <!-- Preset Buttons -->
  <div class="date-range-picker__presets">
    <button
      *ngFor="let preset of presetRanges"
      mat-stroked-button
      type="button"
      (click)="applyPreset(preset.value)"
      [disabled]="disabled">
      {{ preset.label }}
    </button>
  </div>

  <!-- Date Range Picker -->
  <mat-form-field appearance="outline" class="date-range-picker__field">
    <mat-label>Date Range</mat-label>
    <mat-date-range-input [formGroup]="range" [rangePicker]="picker" [disabled]="disabled">
      <input matStartDate formControlName="start" placeholder="Start date" />
      <input matEndDate formControlName="end" placeholder="End date" />
    </mat-date-range-input>
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-date-range-picker #picker></mat-date-range-picker>

    <mat-error *ngIf="range.controls.start.hasError('matStartDateInvalid')">
      Invalid start date
    </mat-error>
    <mat-error *ngIf="range.controls.end.hasError('matEndDateInvalid')">
      Invalid end date
    </mat-error>
    <mat-error *ngIf="!isValidRange && range.value.start && range.value.end">
      Start date must be before or equal to end date
    </mat-error>
  </mat-form-field>

  <!-- Clear Button -->
  <button
    mat-icon-button
    type="button"
    class="date-range-picker__clear"
    (click)="clearRange()"
    [disabled]="disabled || (!range.value.start && !range.value.end)"
    matTooltip="Clear date range"
    aria-label="Clear date range">
    <mat-icon>clear</mat-icon>
  </button>
</div>
