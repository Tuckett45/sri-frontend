<div class="confirm-dialog" [ngClass]="'confirm-dialog--' + data.variant">
  <div class="confirm-dialog__header">
    <mat-icon class="confirm-dialog__icon" [ngClass]="'confirm-dialog__icon--' + data.variant">
      {{ variantIcon }}
    </mat-icon>
    <h2 mat-dialog-title class="confirm-dialog__title">{{ data.title }}</h2>
  </div>

  <mat-dialog-content class="confirm-dialog__content">
    <p>{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions class="confirm-dialog__actions" align="end">
    <button
      mat-button
      type="button"
      (click)="onCancel()"
      cdkFocusInitial>
      {{ data.cancelText }}
    </button>
    <button
      mat-raised-button
      type="button"
      [color]="variantColor"
      (click)="onConfirm()">
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
