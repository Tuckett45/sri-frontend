<div class="empty-state">
  <div class="empty-state__content">
    <mat-icon class="empty-state__icon">{{ icon }}</mat-icon>
    <h3 class="empty-state__message">{{ message }}</h3>
    <p *ngIf="description" class="empty-state__description">{{ description }}</p>
    <button
      *ngIf="actionText"
      mat-raised-button
      color="primary"
      class="empty-state__action"
      (click)="onAction()">
      <mat-icon *ngIf="actionIcon">{{ actionIcon }}</mat-icon>
      {{ actionText }}
    </button>
  </div>
</div>
