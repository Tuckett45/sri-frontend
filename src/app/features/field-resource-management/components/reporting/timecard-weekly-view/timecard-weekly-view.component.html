<mat-card class="weekly-view">
  <mat-card-header>
    <mat-card-title>Weekly Time Entries</mat-card-title>
    <mat-card-subtitle *ngIf="weekStart">Week of {{ weekStart | date:'MMM d, yyyy' }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="days-grid">
      <div class="day-column" *ngFor="let wd of weekDays">
        <div class="day-header">
          <span>{{ wd.date | date:'EEE' }}</span>
          <span class="date">{{ wd.date | date:'M/d' }}</span>
        </div>
        <div class="entries">
          <div class="entry" *ngFor="let entry of wd.entries">
            <span class="entry-time">{{ entry.startTime }} - {{ entry.endTime }}</span>
            <span class="entry-job">{{ entry.jobName }}</span>
            <span class="entry-hours">{{ entry.hours }}h</span>
          </div>
          <div class="no-entries" *ngIf="wd.entries.length === 0">—</div>
        </div>
        <div class="day-total" *ngIf="wd.entries.length > 0">{{ totalHours(wd.entries) }}h total</div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
