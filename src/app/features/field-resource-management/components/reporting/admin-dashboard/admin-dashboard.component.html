<div class="admin-dashboard">
  <h2>Admin Dashboard</h2>

  <div class="kpi-row">
    <app-kpi-card
      *ngFor="let kpi of systemKpis"
      [title]="kpi.title"
      [value]="kpi.value"
      [change]="kpi.change"
      [icon]="kpi.icon">
    </app-kpi-card>
  </div>

  <h3>All Markets Summary</h3>
  <mat-card>
    <table mat-table [dataSource]="markets" class="full-width">
      <ng-container matColumnDef="market">
        <th mat-header-cell *matHeaderCellDef>Market</th>
        <td mat-cell *matCellDef="let m">{{ m.name }}</td>
      </ng-container>
      <ng-container matColumnDef="activeJobs">
        <th mat-header-cell *matHeaderCellDef>Active Jobs</th>
        <td mat-cell *matCellDef="let m">{{ m.activeJobs }}</td>
      </ng-container>
      <ng-container matColumnDef="technicians">
        <th mat-header-cell *matHeaderCellDef>Technicians</th>
        <td mat-cell *matCellDef="let m">{{ m.technicians }}</td>
      </ng-container>
      <ng-container matColumnDef="revenue">
        <th mat-header-cell *matHeaderCellDef>Revenue</th>
        <td mat-cell *matCellDef="let m">{{ m.revenue | currency }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['market','activeJobs','technicians','revenue']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['market','activeJobs','technicians','revenue'];"></tr>
    </table>
    <div class="empty-state" *ngIf="markets.length === 0">
      <mat-icon>location_city</mat-icon>
      <p>No markets data available.</p>
    </div>
  </mat-card>
</div>
