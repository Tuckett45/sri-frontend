<div class="utilization-report">
  <div class="report-header">
    <h2>Technician Utilization Report</h2>
    <div class="date-controls">
      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" [formControl]="startDate">
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" [formControl]="endDate">
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="loadReport()">Run Report</button>
    </div>
  </div>

  <mat-card>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="technician">
        <th mat-header-cell *matHeaderCellDef>Technician</th>
        <td mat-cell *matCellDef="let row">{{ row.technicianName }}</td>
      </ng-container>
      <ng-container matColumnDef="scheduledHours">
        <th mat-header-cell *matHeaderCellDef>Scheduled Hours</th>
        <td mat-cell *matCellDef="let row">{{ row.scheduledHours }}</td>
      </ng-container>
      <ng-container matColumnDef="actualHours">
        <th mat-header-cell *matHeaderCellDef>Actual Hours</th>
        <td mat-cell *matCellDef="let row">{{ row.actualHours }}</td>
      </ng-container>
      <ng-container matColumnDef="utilization">
        <th mat-header-cell *matHeaderCellDef>Utilization %</th>
        <td mat-cell *matCellDef="let row">
          <mat-progress-bar mode="determinate" [value]="row.utilization"></mat-progress-bar>
          {{ row.utilization }}%
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div class="empty-state" *ngIf="dataSource.data.length === 0">
      <mat-icon>bar_chart</mat-icon>
      <p>Run the report to see utilization data.</p>
    </div>
  </mat-card>
</div>
