<div class="timecard-dashboard">
  <h2>My Timecard</h2>

  <div class="clock-section">
    <mat-card class="clock-card">
      <mat-card-content>
        <div class="clock-status">
          <mat-icon [color]="isClockedIn ? 'primary' : ''">access_time</mat-icon>
          <div>
            <div class="status-text">{{ isClockedIn ? 'Clocked In' : 'Clocked Out' }}</div>
            <div class="clock-time" *ngIf="isClockedIn && clockInTime">Since {{ clockInTime | date:'h:mm a' }}</div>
          </div>
        </div>
        <button mat-raised-button [color]="isClockedIn ? 'warn' : 'primary'" (click)="toggleClockIn()">
          {{ isClockedIn ? 'Clock Out' : 'Clock In' }}
        </button>
      </mat-card-content>
    </mat-card>

    <mat-card class="week-summary">
      <mat-card-header><mat-card-title>This Week</mat-card-title></mat-card-header>
      <mat-card-content>
        <div class="total-hours">{{ totalHoursThisWeek }} hrs</div>
        <div class="daily-bars">
          <div class="day-bar" *ngFor="let d of dailySummary">
            <div class="bar" [style.height.px]="d.hours * 4"></div>
            <div class="day-label">{{ d.day }}</div>
            <div class="day-hours">{{ d.hours }}h</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="actions-row">
    <button mat-stroked-button (click)="openManualEntry()">
      <mat-icon>add</mat-icon> Manual Entry
    </button>
  </div>

  <app-timecard-weekly-view [weekStart]="weekStart"></app-timecard-weekly-view>
</div>
