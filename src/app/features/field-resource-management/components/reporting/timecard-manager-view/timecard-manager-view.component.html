<div class="manager-view">
  <div class="view-header">
    <h2>Team Timecards</h2>
    <div class="week-nav">
      <button mat-icon-button (click)="previousWeek()"><mat-icon>chevron_left</mat-icon></button>
      <span>Week of {{ weekStart | date:'MMM d, yyyy' }}</span>
      <button mat-icon-button (click)="nextWeek()"><mat-icon>chevron_right</mat-icon></button>
    </div>
  </div>

  <mat-card>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="technician">
        <th mat-header-cell *matHeaderCellDef>Technician</th>
        <td mat-cell *matCellDef="let row">{{ row.technicianName }}</td>
      </ng-container>
      <ng-container matColumnDef="totalHours">
        <th mat-header-cell *matHeaderCellDef>Total Hours</th>
        <td mat-cell *matCellDef="let row">{{ row.totalHours }}</td>
      </ng-container>
      <ng-container matColumnDef="regularHours">
        <th mat-header-cell *matHeaderCellDef>Regular</th>
        <td mat-cell *matCellDef="let row">{{ row.regularHours }}</td>
      </ng-container>
      <ng-container matColumnDef="overtimeHours">
        <th mat-header-cell *matHeaderCellDef>Overtime</th>
        <td mat-cell *matCellDef="let row">{{ row.overtimeHours }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip [color]="row.status === 'approved' ? 'primary' : row.status === 'rejected' ? 'warn' : ''" selected>
            {{ row.status | titlecase }}
          </mat-chip>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="approve(row)" matTooltip="Approve"
                  [disabled]="row.status === 'approved'">
            <mat-icon>check_circle</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="reject(row)" matTooltip="Reject"
                  [disabled]="row.status === 'rejected'">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div class="empty-state" *ngIf="dataSource.data.length === 0">
      <mat-icon>people</mat-icon>
      <p>No timecard data for this week.</p>
    </div>
  </mat-card>
</div>
