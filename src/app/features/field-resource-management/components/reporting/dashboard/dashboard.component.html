<div class="dashboard">
  <h2>Analytics Dashboard</h2>

  <div class="kpi-row">
    <app-kpi-card
      *ngFor="let kpi of kpis"
      [title]="kpi.title"
      [value]="kpi.value"
      [change]="kpi.change"
      [icon]="kpi.icon">
    </app-kpi-card>
  </div>

  <div class="charts-row">
    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Jobs by Status</mat-card-title></mat-card-header>
      <mat-card-content>
        <div class="chart-placeholder">
          <mat-icon>pie_chart</mat-icon>
          <p>Chart coming soon</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Weekly Utilization</mat-card-title></mat-card-header>
      <mat-card-content>
        <div class="chart-placeholder">
          <mat-icon>bar_chart</mat-icon>
          <p>Chart coming soon</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Revenue Trend</mat-card-title></mat-card-header>
      <mat-card-content>
        <div class="chart-placeholder">
          <mat-icon>show_chart</mat-icon>
          <p>Chart coming soon</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
