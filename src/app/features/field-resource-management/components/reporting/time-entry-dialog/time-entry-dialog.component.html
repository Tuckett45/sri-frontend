<h2 mat-dialog-title>Manual Time Entry</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="datePicker" formControlName="date">
      <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
      <mat-datepicker #datePicker></mat-datepicker>
      <mat-error *ngIf="form.get('date')?.hasError('required')">Date is required</mat-error>
    </mat-form-field>

    <div class="time-row">
      <mat-form-field appearance="outline">
        <mat-label>Start Time</mat-label>
        <input matInput type="time" formControlName="startTime">
        <mat-error *ngIf="form.get('startTime')?.hasError('required')">Required</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>End Time</mat-label>
        <input matInput type="time" formControlName="endTime">
        <mat-error *ngIf="form.get('endTime')?.hasError('required')">Required</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Break Duration (minutes)</mat-label>
      <input matInput type="number" formControlName="breakDuration" min="0">
    </mat-form-field>

    <div class="hours-summary" *ngIf="calculatedHours > 0">
      <mat-icon>schedule</mat-icon>
      <strong>{{ calculatedHours }} hours worked</strong>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Job (optional)</mat-label>
      <mat-select formControlName="jobId">
        <mat-option value="">No Job</mat-option>
        <mat-option *ngFor="let job of jobs" [value]="job.id">{{ job.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes (optional)</mat-label>
      <textarea matInput formControlName="notes" rows="2"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">Save Entry</button>
</mat-dialog-actions>
