<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Field Resource Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1E5A8E 0%, #0D3A5F 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 500px;
    }
    
    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 32px;
      opacity: 0.9;
    }
    
    .retry-button {
      background: #00A8E8;
      color: #FFFFFF;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    
    .retry-button:hover {
      background: #0088C0;
    }
    
    .offline-features {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .offline-features h2 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    
    .offline-features ul {
      list-style: none;
      text-align: left;
      display: inline-block;
    }
    
    .offline-features li {
      padding: 8px 0;
      opacity: 0.8;
    }
    
    .offline-features li::before {
      content: "✓ ";
      color: #4CAF50;
      font-weight: bold;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      📡
    </div>
    
    <h1>You're Offline</h1>
    
    <p>
      It looks like you've lost your internet connection. 
      Don't worry, you can still access some features while offline.
    </p>
    
    <button class="retry-button" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="offline-features">
      <h2>Available Offline</h2>
      <ul>
        <li>View cached job assignments</li>
        <li>Access technician profiles</li>
        <li>Review recent activity</li>
        <li>View saved reports</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
